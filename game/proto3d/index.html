<style>
html,body{margin:0;height:100%;overflow:hidden;background:#0e3742;font-family:Georgia,'Times New Roman',serif;
  -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
#c{display:block;width:100vw;height:100vh}
#hands{display:none;position:fixed;left:50%;bottom:-2vh;transform:translateX(-50%);height:38vh;pointer-events:none;z-index:10}

/* ============ ornate HUD (leather · parchment · gold) ============ */
#hud{position:fixed;inset:0;pointer-events:none;z-index:20;display:none}
.panel{background:linear-gradient(172deg,#6b4226 0%,#4c2d15 55%,#3a2110 100%);
  border:2px solid #caa04e;border-radius:14px;
  box-shadow:0 3px 10px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,230,170,.35),inset 0 -6px 14px rgba(0,0,0,.3)}
#plaque{position:absolute;top:10px;left:10px;padding:8px 14px 10px 60px;pointer-events:auto;min-width:170px}
#avatar{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;
  border:2px solid #e8c064;background:radial-gradient(circle at 38% 34%,#fff6d8 0%,#ffd76a 34%,#e08a2d 78%,#8a4d12 100%);
  box-shadow:0 2px 6px rgba(0,0,0,.5),inset 0 0 8px rgba(255,255,255,.6)}
#hud_name{color:#ffe9b0;font-weight:bold;font-size:15px;text-shadow:0 1px 2px #000}
.chbadge{display:inline-block;margin-left:8px;padding:1px 8px;border-radius:9px;font-size:11.5px;color:#3c2508;
  background:linear-gradient(#ffe08a,#d9a33c);border:1px solid #8a5c14;font-weight:bold}
.coinrow{display:flex;align-items:center;gap:6px;margin-top:5px}
.coin{width:15px;height:15px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff3b0,#ffcf3d 45%,#c78f18 90%);
  border:1px solid #8a5c14;box-shadow:0 1px 2px rgba(0,0,0,.5)}
#hud_coins{color:#ffe08a;font-weight:bold;font-size:14.5px;text-shadow:0 1px 2px #000}
#xpbar{flex:1;height:8px;min-width:56px;border-radius:5px;background:#2a1608;border:1px solid #8a5c14;overflow:hidden}
#xpfill{display:block;height:100%;width:0;background:linear-gradient(#9fe06a,#4f9c2e);border-radius:4px}
#banner{position:absolute;top:8px;left:50%;transform:translateX(-50%);pointer-events:none;
  background:linear-gradient(#f7e9c4,#e8d09a);border:2px solid #a8823f;border-radius:5px;
  padding:5px 26px;color:#4a2c0e;font-weight:bold;font-size:15px;letter-spacing:.4px;
  box-shadow:0 3px 8px rgba(0,0,0,.4),inset 0 0 12px rgba(160,120,50,.25);white-space:nowrap;max-width:44vw;overflow:hidden;text-overflow:ellipsis}
#clockbox{position:absolute;top:10px;right:10px;padding:6px 12px;text-align:right;pointer-events:auto}
#hud_time{color:#ffe9b0;font-size:13px;font-weight:bold;text-shadow:0 1px 2px #000}
#hud_day{color:#d9b268;font-size:11.5px}
#mini{position:absolute;top:64px;right:10px;width:104px;height:104px;border-radius:50%;overflow:hidden;pointer-events:auto;
  border:3px solid #caa04e;box-shadow:0 3px 10px rgba(0,0,0,.5),inset 0 0 10px rgba(0,0,0,.5);background:#1c4a5e}
#minicv{width:100%;height:100%}
#questpanel{position:absolute;top:180px;right:10px;width:190px;pointer-events:auto;overflow:hidden}
.qp-head{background:linear-gradient(#8a5a2c,#6b4226);color:#ffe9b0;font-weight:bold;font-size:13px;
  padding:6px 10px;border-bottom:1px solid #caa04e;text-shadow:0 1px 2px #000;display:flex;justify-content:space-between;cursor:pointer}
#qp_list{background:linear-gradient(#f7e9c4,#eed9a8);padding:6px 9px 8px;font-size:12px;color:#4a2c0e}
#qp_list .qrow{margin:4px 0;line-height:1.35;cursor:pointer}
#qp_list .qrow b{font-size:12px}
#qp_list .st{display:block;font-size:10.5px;color:#8a6a30;font-style:italic}
#qp_list .st.ok{color:#3e7a22;font-weight:bold;font-style:normal}
#nav{position:absolute;right:8px;bottom:8px;display:flex;gap:7px;pointer-events:auto}
#nav button{width:58px;height:60px;border:2px solid #caa04e;border-radius:12px;cursor:pointer;
  background:linear-gradient(172deg,#6b4226,#4c2d15 60%,#3a2110);color:#ffe9b0;
  box-shadow:0 3px 8px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,230,170,.35);
  font-family:inherit;font-size:10.5px;font-weight:bold;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:0}
#nav button .ic{font-size:22px;line-height:1;filter:drop-shadow(0 2px 2px rgba(0,0,0,.5))}
#nav button:active{transform:translateY(1px)}
#bdrawer{position:absolute;left:8px;right:8px;bottom:78px;display:none;gap:8px;pointer-events:auto;
  padding:8px;overflow-x:auto;white-space:nowrap}
#bdrawer .chip{display:inline-flex;flex-direction:column;align-items:center;gap:3px;width:76px;padding:7px 4px;
  border:2px solid #caa04e;border-radius:12px;background:linear-gradient(#f7e9c4,#eed9a8);color:#4a2c0e;
  font-size:11px;font-weight:bold;cursor:pointer;vertical-align:top}
#bdrawer .chip img{width:38px;height:38px;object-fit:contain}
#bdrawer .chip.on{outline:3px solid #ffd76a;background:linear-gradient(#fff3cf,#f4df9d)}
#bdrawer .chip.cant{opacity:.45}
@media (max-width:520px){
  #questpanel{width:168px;top:170px}
  #nav{left:8px;right:8px;justify-content:space-between}
  #nav button{flex:1;max-width:64px}
  #banner{top:auto;bottom:78px;font-size:13px;max-width:60vw}
}

/* ============ parchment modals · toast · speech ============ */
#veil{position:fixed;inset:0;background:rgba(20,10,4,.55);display:none;z-index:40;align-items:center;justify-content:center}
#veil.show{display:flex}
#modal{width:min(480px,92vw);max-height:84vh;overflow:auto;padding:20px 22px;border-radius:16px;
  background:linear-gradient(#f9edcc,#eed9a8);border:3px solid #b98d3f;color:#43290d;
  box-shadow:0 14px 50px rgba(0,0,0,.6),inset 0 0 30px rgba(170,130,60,.25)}
#modal .kicker{font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:#a07a35;font-weight:bold}
#modal h1{margin:6px 0 8px;font-size:23px;color:#4a2c0e}
#modal .sub{font-size:14px;line-height:1.5;color:#5d3d18}
#modal .qtext{font-size:17px;line-height:1.5;font-weight:bold;margin:10px 0;color:#3c2508}
#modal .qvoice{font-style:italic;background:rgba(255,244,210,.8);border-left:4px solid #caa04e;
  padding:8px 10px;margin:10px 0;border-radius:6px;font-size:13.5px;line-height:1.45}
#modal .deed{display:flex;gap:10px;margin:10px 0;padding:9px;border-radius:10px;background:rgba(255,246,220,.75);
  border:1px solid #d3ac5e;font-size:13px;line-height:1.4}
#modal .deed.done{opacity:.62}#modal .deed.locked{opacity:.5}
#modal .deed .dt{font-weight:bold;font-size:14px}
#modal .deed .st{font-size:11.5px;color:#8a6a30;font-style:italic;margin-top:2px}
#modal .btnrow{display:flex;gap:9px;margin-top:14px;flex-wrap:wrap}
#modal button{font-family:inherit;font-weight:bold;font-size:15px;border-radius:11px;cursor:pointer;padding:11px 16px;
  border:2px solid #8a5c14;background:linear-gradient(#f9e7ae,#dfb559);color:#43290d;box-shadow:0 3px 7px rgba(0,0,0,.3)}
#modal button.warm{background:linear-gradient(#ffd98a,#e8952f);flex:1}
#modal button.ghost{background:transparent;border-color:#b98d3f;color:#7a5a25}
#modal button.sm{font-size:12.5px;padding:7px 10px;margin-top:6px}
#modal input{font-family:inherit;font-size:16px;width:100%;box-sizing:border-box;margin:5px 0 12px;padding:10px;
  border-radius:9px;border:2px solid #b98d3f;background:#fff8e2;color:#43290d}
#modal .prow{display:block;width:100%;text-align:left;margin:6px 0}
#toast{position:fixed;left:50%;bottom:86px;transform:translateX(-50%);z-index:50;display:none;max-width:86vw;
  background:rgba(42,24,8,.94);border:2px solid #caa04e;color:#ffe9b0;border-radius:12px;padding:9px 15px;
  font-size:13.5px;text-align:center;box-shadow:0 6px 18px rgba(0,0,0,.5)}
#bubble{position:fixed;left:50%;bottom:140px;transform:translateX(-50%);z-index:30;display:none;max-width:78vw;
  background:linear-gradient(#f9edcc,#eed9a8);border:2px solid #b98d3f;color:#43290d;border-radius:14px;
  padding:10px 15px;font-size:14px;line-height:1.45;box-shadow:0 6px 18px rgba(0,0,0,.45)}
#bubble .spk{font-weight:bold;color:#8a5714}
</style>
</head><body><canvas id="c"></canvas>
<img id="hands" src="../assets/web/hands.webp"><script>if(new URLSearchParams(location.search).get('hands'))document.getElementById('hands').style.display='block';</script>
<div id="hud">
  <div id="plaque" class="panel"><div id="avatar"></div>
    <div><span id="hud_name"></span><span class="chbadge" id="hud_ch"></span></div>

  </div>

  <div id="questpanel" class="panel"><div class="qp-head" id="qp_head"><span>Active Quests</span><span id="qp_tog">–</span></div><div id="qp_list"></div></div>
  <div id="bdrawer" class="panel"></div>
  <div id="nav">
    <button data-nav="quest"><span class="ic">📜</span>Quest</button>

<div id="loader" style="position:fixed;inset:0;z-index:90;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(#173a46,#0e2831);transition:opacity .6s">
  <div style="text-align:center;color:#ffe9b0;font-family:Georgia,serif">
    <div style="width:52px;height:52px;margin:0 auto 14px;border-radius:50%;
      border:4px solid rgba(255,233,176,.25);border-top-color:#ffd76a;animation:lspin 1s linear infinite"></div>
    <div style="font-size:17px;letter-spacing:.5px">The island is waking up…</div>
  </div>
</div>
<style>@keyframes lspin{to{transform:rotate(360deg)}}</style>
<script type="module">
import * as THREE from '../vendor/three.module.js';

/* growth: 0 = Chapter 1 (pale, misty, tender) … 1 = Chapter 10 (earned golden dusk).
   The island's light literally grows with the child. Driven in-game by chapterOf(doneCount). */
const Q=new URLSearchParams(location.search);
const GROWTH = Math.max(0, Math.min(1, parseFloat(Q.get('growth') ?? '1')));

/* ---------- seeded terrain (unique island per child — ?seed= comes from the profile) ---------- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const SEED=(parseInt(Q.get('seed')||'',10)>>>0)||12345, rng=mulberry32(SEED), OFF=rng()*1000, OFF2=rng()*1000;
function vnoise(x,y){const xi=Math.floor(x),yi=Math.floor(y),xf=x-xi,yf=y-yi;
  const u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf);
  const h=(a,b)=>{let n=(Math.imul(a,374761393)+Math.imul(b,668265263))|0;n=Math.imul(n^(n>>>13),1274126177)|0;return((n>>>0)&1023)/1023;};
  const a=h(xi,yi),b=h(xi+1,yi),c=h(xi,yi+1),d=h(xi+1,yi+1);
  const ab=a+(b-a)*u,cd=c+(d-c)*u;return ab+(cd-ab)*v;}
function fbm(x,y){let s=0,amp=0.5,f=1;for(let i=0;i<5;i++){s+=amp*vnoise(x*f+OFF,y*f+OFF2);f*=2;amp*=0.5;}return s;}
function smooth(a,b,t){t=Math.max(0,Math.min(1,(t-a)/(b-a)));return t*t*(3-2*t);}
const TERR=900;
function height(x,z){
  const nx=x/TERR,nz=z/TERR,r=Math.sqrt(nx*nx+nz*nz)*2;
  const island=1-smooth(0.62,1.04,r);
  let h=island*(6+fbm(x*0.0016,z*0.0016)*22);
  const ridge=Math.max(0,(-nz-0.02));
  h+=island*(ridge*80+ridge*ridge*260);
  h+=island*ridge*ridge*fbm(x*0.004+9,z*0.004+3)*90;
  return h-4;
}

/* ---------- renderer & scene ---------- */
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.outputColorSpace=THREE.SRGBColorSpace;
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(innerHeight>innerWidth?70:60,innerWidth/innerHeight,0.5,6000);

function toonGrad(){const d=new Uint8Array([118,155,192,224,245]);const t=new THREE.DataTexture(d,d.length,1,THREE.RedFormat);t.needsUpdate=true;return t;}
const GRAD=toonGrad();
const lerpC=(a,b,t)=>new THREE.Color(a).lerp(new THREE.Color(b),t);
const uTime={value:0};
const COLLIDERS=[];                                  // {x,z,r} — solid things the player can't walk through
function solid(x,z,r){COLLIDERS.push({x,z,r});}

/* ---------- sky dome ---------- */
const skyU={top:{value:new THREE.Color()},mid:{value:new THREE.Color()},bot:{value:new THREE.Color()},
  sunDir:{value:new THREE.Vector3(0,1,0)},glow:{value:new THREE.Color()},glowAmt:{value:0.5}};
const sky=new THREE.Mesh(new THREE.SphereGeometry(4000,32,16),new THREE.ShaderMaterial({side:THREE.BackSide,uniforms:skyU,
  vertexShader:`varying vec3 vp;void main(){vp=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader:`varying vec3 vp;uniform vec3 top,mid,bot,glow;uniform vec3 sunDir;uniform float glowAmt;
    void main(){vec3 d=normalize(vp);float h=d.y;
    vec3 c=h>0.0?mix(mid,top,smoothstep(0.0,0.5,h)):mix(mid,bot,smoothstep(0.0,-0.12,h));
    float s=max(dot(d,normalize(sunDir)),0.0);
    c+=glow*glowAmt*(pow(s,5.0)*0.45+pow(s,28.0)*0.65);        // warm halo lives around the sun
    c=mix(c,bot,exp(-abs(h)*14.0)*0.85);                       // cream haze band melts sea into sky
    c+=(fract(sin(dot(gl_FragCoord.xy,vec2(12.9898,78.233)))*43758.5453)-0.5)/128.0;  // dither kills banding
    gl_FragColor=vec4(c,1.0);}`}));
scene.add(sky);

/* ---------- lights ---------- */
const sun=new THREE.DirectionalLight(0xffffff,1);sun.position.set(-600,420,-500);scene.add(sun);
const hemi=new THREE.HemisphereLight(0xffffff,0x777777,0.8);scene.add(hemi);
const amb=new THREE.AmbientLight(0xffffff,0.3);scene.add(amb);

/* ---------- the sun itself, and slow painterly clouds ---------- */
const sunDisc=(()=>{const c=document.createElement('canvas');c.width=c.height=128;
 const g=c.getContext('2d'),gr=g.createRadialGradient(64,64,8,64,64,62);
 gr.addColorStop(0,'rgba(255,255,244,1)');gr.addColorStop(0.28,'rgba(255,238,196,0.9)');gr.addColorStop(1,'rgba(255,222,160,0)');
 g.fillStyle=gr;g.fillRect(0,0,128,128);
 const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true,depthWrite:false,fog:false}));
 s.position.copy(sun.position).normalize().multiplyScalar(3800);sky.add(s);return s;})();
const clouds=[];
{const c=document.createElement('canvas');c.width=256;c.height=128;const g=c.getContext('2d');
 g.filter='blur(6px)';g.fillStyle='#fff';                       // stacked cumulus puffs, soft flat base
 for(const[px,py,pr] of [[60,84,26],[92,70,30],[128,62,34],[164,70,30],[196,84,24],[92,92,28],[150,90,30],[120,86,32]]){
   g.beginPath();g.arc(px,py,pr,0,Math.PI*2);g.fill();}
 g.filter='none';
 const fade=g.createLinearGradient(0,94,0,122);
 fade.addColorStop(0,'rgba(0,0,0,0)');fade.addColorStop(1,'rgba(0,0,0,1)');
 g.globalCompositeOperation='destination-out';g.fillStyle=fade;g.fillRect(0,94,256,34);
 g.globalCompositeOperation='source-over';
 const ctex=new THREE.CanvasTexture(c), crng=mulberry32(SEED+99);
 for(let i=0;i<8;i++){
   const s=new THREE.Sprite(new THREE.SpriteMaterial({map:ctex,transparent:true,opacity:0.5+crng()*0.25,depthWrite:false,fog:false}));
   const d=1400+crng()*1400,th=crng()*Math.PI*2;
   s.position.set(Math.cos(th)*d,280+crng()*260,Math.sin(th)*d);
   const w=420+crng()*380;s.scale.set(w,w*0.5,1);scene.add(s);clouds.push(s);}}

/* ---------- THE LIGHT GROWS WITH THE CHILD ---------- */
function setGrowth(t){
  // sky: pale silvery morning → deep blue/gold dusk
  skyU.top.value=lerpC('#9fb9c8','#33608f',t);
  skyU.mid.value=lerpC('#cfd9d8','#d8a279',t);
  skyU.bot.value=lerpC('#e8ece6','#f6dfb2',t);
  skyU.glow.value=lerpC('#fff4dd','#ffb45e',t);
  skyU.glowAmt.value=0.30+t*0.55;
  // sun: cool weak & high → warm golden strong, sinking toward the horizon
  sun.color=lerpC('#e8eef0','#ffdf9e',t); sun.intensity=1.05+t*1.75;
  sun.position.set(-230+130*t,430-t*250,-580+1180*t);  // morning over the ridge → dusk setting over the southern sea
  skyU.sunDir.value.copy(sun.position).normalize();
  sunDisc.position.copy(sun.position).normalize().multiplyScalar(3800);
  const az=Math.atan2(sun.position.x,sun.position.z);   // the golden path follows the sun
  glint.rotation.z=-az;glint.position.set(Math.sin(az)*820,0.45,Math.cos(az)*820);
  hemi.color=lerpC('#dfe8ee','#bfe0ff',t); hemi.groundColor=lerpC('#8a9088','#5a4a2e',t); hemi.intensity=1.0-t*0.1;
  amb.color=lerpC('#f2f5f2','#fff2d8',t); amb.intensity=0.5-t*0.15;
  // fog: close pale mist → far warm haze (the island "clears up when it gets to see you")
  const fc=lerpC('#dfe5e2','#f2d9a8',t);
  scene.fog=new THREE.Fog(fc, 130+t*260, 820+t*1400);
  renderer.setClearColor(fc);
  // sea, sun and clouds ripen with the light
  oceanMat.color=lerpC('#8aa2ab','#3a93b0',t);
  shallowMat.color=lerpC('#b9c6c6','#ffffff',t);
  glint.material.opacity=0.1+t*0.45;
  sunDisc.material.color=lerpC('#f2f4f0','#ffcf7a',t);
  const sd=260+t*260;sunDisc.scale.set(sd,sd,1);
  for(const c of clouds)c.material.color=lerpC('#eef2f4','#ffd9b5',t);
  // cave & waterfall wake up as the island does
  caveLight.intensity=2+t*26; caveGlow.userData.base=0.25+t*0.75;
  falls.visible=t>0.15; falls.material.opacity=Math.min(1,(t-0.15)*2);
  for(const m of mist)m.visible=t>0.15;
  // fireflies belong to the earned dusk
  for(const f of flies)f.userData.op=Math.max(0,t-0.45)*1.7;
  // companions arrive by chapter (Bright 1 … Thread 9)
  const chapter=1+t*9;
  for(const c of COMPANIONS){const on=chapter>=c.ch-1e-6;
    c.sp.visible=on; if(c.sp.userData.shadow)c.sp.userData.shadow.visible=on;
    for(const o of c.extras)o.visible=on;}
}

/* ---------- terrain ---------- */
const loader0=new THREE.TextureLoader();
const SEG=260, geo=new THREE.PlaneGeometry(TERR*2.2,TERR*2.2,SEG,SEG);
geo.rotateX(-Math.PI/2);
const pos=geo.attributes.position,col=[];
const cSand=new THREE.Color('#fff5dc'),cGrass=new THREE.Color('#f4ffd8'),cLo=new THREE.Color('#c2d69a'),
      cRock=new THREE.Color('#cdbfa9'),cHi=new THREE.Color('#e8dcc4');
for(let i=0;i<pos.count;i++){
  const x=pos.getX(i),z=pos.getZ(i),y=height(x,z);pos.setY(i,y);
  const e=6,dy=height(x+e,z)-height(x-e,z),dz=height(x,z+e)-height(x,z-e);
  const slope=Math.min(1,Math.sqrt(dy*dy+dz*dz)/e*0.9);
  const c=new THREE.Color();
  if(y<2.2)c.copy(cSand);
  else{c.copy(cGrass).lerp(cLo,smooth(2,20,y));c.lerp(cLo,fbm(x*0.02,z*0.02)*0.55);if(slope>0.35)c.lerp(cRock,smooth(0.35,0.8,slope));
       if(y>34)c.lerp(cHi,smooth(34,60,y));}
  col.push(c.r,c.g,c.b);
}
geo.setAttribute('color',new THREE.Float32BufferAttribute(col,3));

    const t2=now*0.0009;
    const gx=b.sp.position.x+Math.sin(t2)*4.5, gz=b.sp.position.z+Math.cos(t2)*4.5,

/* ---- tiny synthesised audio (ported from /play) ---- */
const SFX=(()=>{
  let ac=null,master=null,ambient=null,ambientWanted=false;
  let muted=store.get("tlbi_muted")==="1";
  function actx(){
    if(muted)return null;
    if(!ac){try{const AC=window.AudioContext||window.webkitAudioContext;ac=new AC();
      master=ac.createGain();master.gain.value=0.5;master.connect(ac.destination);}catch(e){ac=null;}}
    if(ac&&ac.state==="suspended")ac.resume();
    return ac;
  }
  function tone(freq,dur,type,vol,slideTo,delay){
    const a=actx();if(!a)return;
    const t0=a.currentTime+(delay||0),o=a.createOscillator(),g=a.createGain();
    o.type=type||"sine";o.frequency.setValueAtTime(freq,t0);
    if(slideTo)o.frequency.exponentialRampToValueAtTime(slideTo,t0+dur);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(vol||0.3,t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    o.connect(g);g.connect(master);o.start(t0);o.stop(t0+dur+0.03);
  }
  function seqq(freqs,dur,type,vol,gap){freqs.forEach((f,i)=>tone(f,dur,type,vol,null,i*(gap||0.07)));}
  function setAmbient(on){
    ambientWanted=on;const a=actx();if(!a)return;
    if(ambient){try{ambient.src.stop();}catch(e){}ambient=null;}
    if(!on)return;
    const buf=a.createBuffer(1,a.sampleRate*2,a.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.5;
    const src=a.createBufferSource();src.buffer=buf;src.loop=true;
    const lp=a.createBiquadFilter();lp.type="lowpass";lp.frequency.value=430;
    const g=a.createGain();g.gain.value=0.03;
    src.connect(lp);lp.connect(g);g.connect(master);src.start();
    ambient={src};
  }
  return {
    get muted(){return muted;},
    unlock(){const a=actx();if(a&&ambientWanted&&!ambient)setAmbient(true);},
    ambient:setAmbient,
    toggleMute(){muted=!muted;store.set("tlbi_muted",muted?"1":"0");
      if(muted){if(ambient){try{ambient.src.stop();}catch(e){}ambient=null;}if(master)master.gain.value=0;}
      else{if(master)master.gain.value=0.5;actx();if(ambientWanted)setAmbient(true);}
      return muted;},
    step(){tone(88+Math.random()*22,0.09,"triangle",0.09,66);},
    coin(){tone(880,0.09,"square",0.14);tone(1320,0.12,"square",0.11,null,0.06);},
    quest(){seqq([523,659,784,1047],0.5,"sine",0.15);},
    big(){seqq([392,523,659,784,1047],0.7,"sine",0.17,0.09);},
    chime(){tone(1047,0.45,"sine",0.11);}
  };
})();

  };
  $("q_wit").onclick=()=>finish(true);
  $("q_solo").onclick=()=>finish(false);
}

/* ---- the Parent Corner: grown-ups are part of the game (per the family plan) ---- */
function pinGate(then){
  if(!DB.parentPin){
    showModal('<div class="kicker">grown-ups only · one-time setup</div><h1>Create a Parent PIN</h1>'+
      '<p class="sub">This corner is for grown-ups: you confirm the real-world quests your child reports, and their island grows. Pick a 4-digit PIN kids don\'t know.</p>'+
      '<input id="pin1" inputmode="numeric" maxlength="4" placeholder="4-digit PIN">'+
      '<input id="pin2" inputmode="numeric" maxlength="4" placeholder="Repeat PIN">'+
      '<div class="btnrow"><button class="warm" id="pin_go">Save PIN</button>'+
      '<button class="ghost" onclick="hideModal()">Cancel</button></div>');
    $("pin_go").onclick=()=>{
      const a=$("pin1").value.trim(),b=$("pin2").value.trim();
      if(!/^\d{4}$/.test(a)){$("pin1").focus();return;}
      if(a!==b){toast("PINs don't match — try again");return;}
      DB.parentPin=a;save();then();
    };
    return;
  }
  showModal('<div class="kicker">grown-ups only</div><h1>Parent Corner</h1>'+
    '<p class="sub">Enter the parent PIN.</p>'+
    '<input id="pin1" inputmode="numeric" maxlength="4" placeholder="PIN">'+
    '<div class="btnrow"><button class="warm" id="pin_go">Enter</button>'+
    '<button class="ghost" onclick="hideModal()">Cancel</button></div>');
  $("pin_go").onclick=()=>{
    if($("pin1").value.trim()===DB.parentPin)then();
    else toast("That's not the PIN");
  };
}
function openParents(){pinGate(renderParents);}
function renderParents(){
  const pend=(DB.pending||[]);
  let h='<div class="kicker">parent corner · real deeds, confirmed by you</div><h1>Waiting for you</h1>';
  if(!pend.length)h+='<p class="sub">Nothing waiting. When your child finishes a quest and taps “I did it,” it appears here for your confirmation — and their island grows when you confirm.</p>';
  pend.forEach((it,i)=>{
    h+='<div class="deed"><div><div class="dt">'+esc(it.name)+' · '+TRE[it.tr].name+'</div>'+
      '<div class="dd">'+esc(it.text)+'</div>'+
      '<button class="sm" data-conf="'+i+'">It really happened — grow the island (+4)</button> '+
      '<button class="sm" data-skip="'+i+'" style="opacity:.7">Not yet</button></div></div>';
  });
  h+='<div class="qvoice">House rules from the book: kids can never spend money here, there is no chat, and coins are only earned by real-world deeds. Your child\'s data lives on this device.</div>'+
    '<div class="btnrow"><button id="pp_switch">Switch explorer</button>'+
    '<button class="ghost" onclick="hideModal()">Close</button></div>';
  showModal(h);
  $("pp_switch").onclick=()=>{hideModal();showStart();};
  document.querySelectorAll("[data-conf]").forEach(b=>b.onclick=()=>{
    const it=(DB.pending||[]).splice(+b.dataset.conf,1)[0];
    const prof=DB.profiles.find(p=>p.id===it.pid);
    if(prof){prof.coins+=4;
      if(prof.mir&&prof.mir[it.tr]&&prof.mir[it.tr].s>0){prof.mir[it.tr].s--;prof.mir[it.tr].w++;}}
    save();SFX.big();confetti();
    if(P&&prof&&P.id===prof.id){hudUI();
      bubble(TRE[it.tr].who,"A grown-up saw it. It's REAL real now. The island grew.",5000);}
    renderParents();
  });
  document.querySelectorAll("[data-skip]").forEach(b=>b.onclick=()=>{
    (DB.pending||[]).splice(+b.dataset.skip,1);save();renderParents();
  });
}

/* ---- big deeds (grown-up sized real-life stuff) ---- */
function openDeeds(){
  let h='<div class="kicker">big deeds · big real-life stuff earns big island stuff</div><h1>Big Deeds</h1>';
  DEEDS.forEach(d=>{
    const done=P.deeds[d.id]==="done",locked=P.chapter<d.ch;
    const prog=typeof P.deeds[d.id]==="number"?P.deeds[d.id]:0;
    h+='<div class="deed'+(done?" done":locked?" locked":"")+'"><div>'+
      '<div class="dt">'+d.title+(done?" — DONE":"")+'</div>';
    if(locked)h+='<div class="st">Locked — reaches you at Chapter '+d.ch+'</div>';
    else if(done)h+='<div class="st">'+(d.reward.type==="expand"?"Your island grew!":d.reward.type==="cat"?"The cat follows you around now.":"Earned, forever.")+'</div>';
    else{
      h+='<div class="dd">'+esc(d.task)+'</div><div class="st">'+esc(d.voice)+'</div>';
      if(d.counter)h+='<div class="st">Laughs so far: <b>'+prog+' of '+d.counter+'</b></div>';
      h+='<button class="sm" data-deed="'+d.id+'">'+esc(d.btn)+'</button>';
    }
    h+='</div></div>';
  });
  h+='<div class="btnrow"><button class="ghost" onclick="hideModal()">Back to the island</button></div>';
  showModal(h);
  document.querySelectorAll("[data-deed]").forEach(b=>b.onclick=()=>doDeed(b.dataset.deed));
}
function doDeed(id){
  const d=DEEDS.find(x=>x.id===id);
  if(d.counter){
    const v=(typeof P.deeds[id]==="number"?P.deeds[id]:0)+1;
    if(v<d.counter){P.deeds[id]=v;save();openDeeds();hudUI();
      toast("Laugh "+v+" of "+d.counter+"! Keep going!");return;}
  }
  P.deeds[id]="done";save();SFX.big();confetti();hudUI();
  if(d.reward.type==="expand"){
    P.expansions=(P.expansions||0)+1;save();
    showModal('<div class="kicker">the ground rumbles politely</div><h1>Your island GREW.</h1>'+
      '<p class="sub">A whole new piece of land rose out of the sea, because of something kind and real you did out there. It\'s hiding in the fog.</p>'+
      '<div class="btnrow"><button class="warm" onclick="hideModal()">Go explore it</button></div>');
  }else if(d.reward.type==="cat"){
    showModal('<div class="kicker">rescue complete</div><h1>You saved the cat!</h1>'+
      '<p class="sub">You did the scary thing, so you were brave enough to climb. The cat pretends it was fine the whole time. Cats.</p>'+
      '<div class="qvoice">Shaky: "Your voice shook and you did it anyway. That\'s the whole trick. That\'s the entire trick."</div>'+
      '<div class="btnrow"><button class="warm" onclick="hideModal()">Hi, cat</button></div>');
  }else{
    showModal('<div class="kicker">earned, not bought</div><h1>'+d.title+' is yours!</h1>'+
      '<p class="sub">Nobody can buy this. It only exists because of what you did out there.</p>'+
      '<div class="btnrow"><button class="warm" onclick="hideModal()">Beautiful</button></div>');
  }
}

/* ---- start screen: choose or create an explorer (same profiles as /play) ---- */
function showStart(){
  $("hud").style.display="none";SFX.ambient(false);
  let h='<div class="kicker">world &amp; words © Bianca · the little big island</div><h1>Who\'s exploring today?</h1>';
  if(DB.profiles.length){
    DB.profiles.forEach(p=>{h+='<button class="prow" data-id="'+p.id+'">'+esc(p.name)+
      ' <span style="font-weight:normal;font-size:12px;opacity:.75">· Chapter '+p.chapter+' · '+p.coins+' coins · '+esc(p.islandName)+'</span></button>';});
    h+='<div class="btnrow"><button class="ghost" id="f_new">+ New explorer</button></div>';
    showModal(h);
    document.querySelectorAll("#modal .prow").forEach(b=>b.onclick=()=>{P=DB.profiles.find(p=>p.id===b.dataset.id);enterIsland();});
    $("f_new").onclick=()=>showCreate();
  } else showCreate();
}
function showCreate(){
  showModal('<div class="kicker">a new island rises from the sea</div><h1>Name your explorer</h1>'+
    '<p class="sub">Your name</p><input id="f_name" maxlength="16" autocomplete="off">'+
    '<p class="sub">Your island\'s name (optional)</p><input id="f_island" maxlength="22" autocomplete="off">'+
    '<div class="btnrow"><button class="warm" id="f_go">Walk on my island</button></div>');
  $("f_go").onclick=()=>{
    const nm=$("f_name").value.trim(),isl=$("f_island").value.trim();
    if(!nm){$("f_name").focus();return;}
    const seed=hash(nm+"|"+isl+"|"+Date.now());
    P={id:"p"+Date.now().toString(36),name:nm,islandName:isl||(nm+"'s Island"),seed,
      coins:60,placed:[],interiors:{},revealed:[],found:[],
      deck:newDeck(mulberry32(seed+1)),deckPos:0,activeQuest:null,doneCount:0,epoch:1,
      hand:HANDCOLORS[0],birthM:null,birthD:null,chapter:1,deeds:{},expansions:0,
      lastBday:null,bdayUnlocked:false,metNpcs:["bright"]};
    DB.profiles.push(P);save();
    enterIsland();
  };
}
function enterIsland(){
  if((P.seed>>>0)!==SEED){                 // this island belongs to a different seed → rebuild the world for it
    store.set(SAVE_KEY,JSON.stringify(DB));
    const u=new URL(location.href);
    u.searchParams.set('seed',P.seed>>>0);u.searchParams.set('p',P.id);
    u.searchParams.delete('growth');
    location.replace(u);return;
  }
  hideModal();
  P.mir=P.mir||{};TORDER.forEach(t=>P.mir[t]=P.mir[t]||{w:0,s:0});
  $("hud").style.display="block";
  setGrowth(chapterGrowth());
  refreshPlaced();
  hudUI();clockUI();drawMini();
  SFX.ambient(true);
  setTimeout(()=>bubble("Bright","Welcome"+(P.doneCount?" back":"")+", "+P.name+"! Walk into the world — the island clears up when it gets to see you."),700);
}

/* ---- BUILD: place real things on your island (same placed[] format as /play) ----
   2.5D island space is 1800×1300 centered at (900,650); 3D world is ±450.
   Mapping: x3d=(x2d-900)/2 · z3d=(y2d-650)/2 — old placements appear where they were. */
const BUILD_ITEMS=[
  {i:0, k:"tree", n:"Tree", c:0, s:52, a:1.05},
  {i:2, k:"pine", n:"Pine", c:0, s:54, a:0.7},
  {i:12,k:"rock", n:"Rock", c:0, s:30, a:1.15},
  {i:40,k:"house",n:"House",c:20,s:66, a:1.05},
];
let building=false,selBuild=null,placedMeshes=[];
const buildTexCache={};
function buildTex(k){if(!buildTexCache[k])buildTexCache[k]=loader.load('../assets/web/'+k+'.webp',t=>{t.colorSpace=THREE.SRGBColorSpace;});
  return buildTexCache[k];}
function spawnPlaced(bi,pl){
  const hgt=bi.s*0.65,x=(pl.x-900)/2,z=(pl.y-650)/2,y=groundY(x,z);
  if(Math.abs(x)>460||Math.abs(z)>460||y<0.8)return;   // 2.5D placements beyond this island stay saved, just not shown
  const sp2=new THREE.Sprite(new THREE.SpriteMaterial({map:buildTex(bi.k),alphaTest:0.3}));
  sp2.scale.set(hgt*bi.a,hgt,1);sp2.position.set(x,y+hgt*0.46,z);scene.add(sp2);
  const sh=blobShadow(x,z,hgt*0.30);
  const col={x,z,r:Math.max(2.4,hgt*0.11)};COLLIDERS.push(col);
  placedMeshes.push({sp:sp2,sh,col,id:pl.id});
}
function refreshPlaced(){
  for(const m of placedMeshes){m.sp.removeFromParent();m.sh.removeFromParent();
    const ci=COLLIDERS.indexOf(m.col);if(ci>=0)COLLIDERS.splice(ci,1);}
  placedMeshes=[];
  if(!P)return;
  for(const pl of (P.placed||[])){
    const bi=BUILD_ITEMS.find(b=>b.i===pl.i);
    if(bi)spawnPlaced(bi,pl);
  }
}
function renderBDrawer(){
  $("bdrawer").innerHTML=BUILD_ITEMS.map((b,ix)=>'<div class="chip'+(selBuild===ix?" on":"")+(b.c>P.coins?" cant":"")+'" data-b="'+ix+'">'+
    '<img src="../assets/web/'+b.k+'.webp"><span>'+b.n+(b.c?" · "+b.c+"c":" · free")+'</span></div>').join("");
  document.querySelectorAll("#bdrawer .chip").forEach(ch=>ch.onclick=()=>{
    const ix=+ch.dataset.b;
    if(BUILD_ITEMS[ix].c>P.coins){toast("Not enough coins — do a quest!");return;}
    selBuild=(selBuild===ix)?null:ix;renderBDrawer();});
}
function toggleBuild(){
  if(!P)return;
  building=!building;window.__building=building;
  $("bdrawer").style.display=building?"flex":"none";
  $("questpanel").style.display=building?"none":"";
  $("mini").style.display=building?"none":"";
  const nb=document.querySelector('#nav button[data-nav=build]');
  if(nb)nb.querySelector(".ic").textContent=building?"🚶":"🔨";
  if(nb)nb.lastChild.textContent=building?"Walk":"Build";
  if(building){renderBDrawer();
    toast("You flew up to see your island! Pick a thing, tap the ground to place it · tap a placed thing to pick it up · drag to pan");}
  else selBuild=null;
}

/* ---- nav ---- */
document.querySelectorAll("#nav button").forEach(b=>b.onclick=()=>{
  const k=b.dataset.nav;
  if(k==="quest")openQuest();
  else if(k==="deeds")openDeeds();
  else if(k==="map")openMap();
  else if(k==="sound"){const m=SFX.toggleMute();b.querySelector(".ic").textContent=m?"🔇":"🔊";toast(m?"Sound off":"Sound on");}
  else if(k==="parents")openParents();
  else if(k==="build")toggleBuild();
});

/* ---- tap a companion to talk ---- */
const ray=new THREE.Raycaster(),tapV=new THREE.Vector2();
let downAt=null;
addEventListener('pointerdown',e=>{downAt={x:e.clientX,y:e.clientY,t:Date.now()};});
addEventListener('pointerup',e=>{
  if(!P||SHOWCASE||!downAt)return;
  if(e.target.closest&&e.target.closest('#hud,#veil,#toast,#bubble'))return;
  if(Math.hypot(e.clientX-downAt.x,e.clientY-downAt.y)>10||Date.now()-downAt.t>400)return;
  tapV.set(e.clientX/innerWidth*2-1,-(e.clientY/innerHeight)*2+1);
  ray.setFromCamera(tapV,camera);
  if(building){
    const hitP=ray.intersectObjects(placedMeshes.map(m=>m.sp));
    if(hitP.length){                                  // pick a placed thing back up (coins come back)
      const mesh=placedMeshes.find(m=>m.sp===hitP[0].object);
      const idx=P.placed.findIndex(pl=>pl.id===mesh.id);
      if(idx>=0){const bi=BUILD_ITEMS.find(b=>b.i===P.placed[idx].i);
        P.coins+=bi.c;P.placed.splice(idx,1);save();hudUI();refreshPlaced();renderBDrawer();
        SFX.coin();toast("Picked up the "+bi.n.toLowerCase()+(bi.c?" · +"+bi.c+" coins back":""));}
      return;
    }
    if(selBuild!==null){
      const hitT=ray.intersectObject(terrain);
      if(hitT.length){
        const p=hitT[0].point;
        if(height(p.x,p.z)<1.4){toast("Too close to the sea — pick drier ground");return;}
        const bi=BUILD_ITEMS[selBuild];
        if(bi.c>P.coins){toast("Not enough coins — do a quest!");return;}
        P.coins-=bi.c;
        const pl={i:bi.i,x:Math.round(p.x*2+900),y:Math.round(p.z*2+650),id:"h"+Date.now().toString(36)};
        P.placed.push(pl);save();hudUI();spawnPlaced(bi,pl);renderBDrawer();SFX.chime();
      }
    }
    return;
  }
  const hits=ray.intersectObjects(COMPANIONS.filter(c=>c.sp.visible).map(c=>c.sp));
  if(hits.length){
    const key=hits[0].object.userData.npc,n=NPCS.find(x=>x.k===key);
    if(n){bubble(n.name,n.lines[Math.floor(Math.random()*n.lines.length)],6000);SFX.chime();
      if(!P.metNpcs.includes(key)){P.metNpcs.push(key);save();}}
  }
});

/* ---- boot ---- */
renderMiniBase();
{const hide=()=>{const l=$("loader");if(!l||l.style.opacity==="0")return;
   l.style.opacity="0";setTimeout(()=>l.style.display="none",700);};
 THREE.DefaultLoadingManager.onLoad=hide;
 setTimeout(hide,7000);}                       // never trap a child on the spinner
if(!SHOWCASE){
  const pid=Q.get('p');
  const prof=pid&&DB.profiles.find(x=>x.id===pid&&(x.seed>>>0)===SEED);
  if(prof){P=prof;enterIsland();}              // arriving on your own island after the seed rebuild
  else showStart();
}
