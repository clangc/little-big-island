<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Island Explorer — 3D slice</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#0e3742}#c{display:block;width:100vw;height:100vh}
#hands{display:none;position:fixed;left:50%;bottom:-2vh;transform:translateX(-50%);height:38vh;pointer-events:none;z-index:10}</style>
</head><body><canvas id="c"></canvas>
<img id="hands" src="../assets/hands.png"><script>if(new URLSearchParams(location.search).get('hands'))document.getElementById('hands').style.display='block';</script>
<script type="module">
import * as THREE from '../vendor/three.module.js';

/* growth: 0 = Chapter 1 (pale, misty, tender) … 1 = Chapter 10 (earned golden dusk).
   The island's light literally grows with the child. Driven in-game by chapterOf(doneCount). */
const GROWTH = Math.max(0, Math.min(1, parseFloat(new URLSearchParams(location.search).get('growth') ?? '1')));

/* ---------- seeded terrain (unique island per child) ---------- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const SEED=12345, rng=mulberry32(SEED), OFF=rng()*1000, OFF2=rng()*1000;
function vnoise(x,y){const xi=Math.floor(x),yi=Math.floor(y),xf=x-xi,yf=y-yi;
  const u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf);
  const h=(a,b)=>{let n=(Math.imul(a,374761393)+Math.imul(b,668265263))|0;n=Math.imul(n^(n>>>13),1274126177)|0;return((n>>>0)&1023)/1023;};
  const a=h(xi,yi),b=h(xi+1,yi),c=h(xi,yi+1),d=h(xi+1,yi+1);
  const ab=a+(b-a)*u,cd=c+(d-c)*u;return ab+(cd-ab)*v;}
function fbm(x,y){let s=0,amp=0.5,f=1;for(let i=0;i<5;i++){s+=amp*vnoise(x*f+OFF,y*f+OFF2);f*=2;amp*=0.5;}return s;}
function smooth(a,b,t){t=Math.max(0,Math.min(1,(t-a)/(b-a)));return t*t*(3-2*t);}
const TERR=900;
function height(x,z){
  const nx=x/TERR,nz=z/TERR,r=Math.sqrt(nx*nx+nz*nz)*2;
  const island=1-smooth(0.62,1.04,r);
  let h=island*(6+fbm(x*0.0016,z*0.0016)*22);
  const ridge=Math.max(0,(-nz-0.02));
  h+=island*(ridge*80+ridge*ridge*260);
  h+=island*ridge*ridge*fbm(x*0.004+9,z*0.004+3)*90;
  return h-4;
}

/* ---------- renderer & scene ---------- */
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.outputColorSpace=THREE.SRGBColorSpace;
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(innerHeight>innerWidth?70:60,innerWidth/innerHeight,0.5,6000);

function toonGrad(){const d=new Uint8Array([90,150,205,245]);const t=new THREE.DataTexture(d,d.length,1,THREE.RedFormat);t.needsUpdate=true;return t;}
const GRAD=toonGrad();
const lerpC=(a,b,t)=>new THREE.Color(a).lerp(new THREE.Color(b),t);

/* ---------- sky dome ---------- */
const skyU={top:{value:new THREE.Color()},mid:{value:new THREE.Color()},bot:{value:new THREE.Color()}};
const sky=new THREE.Mesh(new THREE.SphereGeometry(4000,32,16),new THREE.ShaderMaterial({side:THREE.BackSide,uniforms:skyU,
  vertexShader:`varying vec3 vp;void main(){vp=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader:`varying vec3 vp;uniform vec3 top,mid,bot;void main(){float h=normalize(vp).y;
    vec3 c=h>0.0?mix(mid,top,smoothstep(0.0,0.55,h)):mix(mid,bot,smoothstep(0.0,-0.15,h));gl_FragColor=vec4(c,1.0);}`}));
scene.add(sky);

/* ---------- lights ---------- */
const sun=new THREE.DirectionalLight(0xffffff,1);sun.position.set(-600,420,-500);scene.add(sun);
const hemi=new THREE.HemisphereLight(0xffffff,0x777777,0.8);scene.add(hemi);
const amb=new THREE.AmbientLight(0xffffff,0.3);scene.add(amb);

/* ---------- THE LIGHT GROWS WITH THE CHILD ---------- */
function setGrowth(t){
  // sky: pale silvery morning → deep blue/gold dusk
  skyU.top.value=lerpC('#9fb9c8','#2f6a97',t);
  skyU.mid.value=lerpC('#cfd9d8','#c98f6a',t);
  skyU.bot.value=lerpC('#e8ece6','#f4dcaa',t);
  // sun: cool weak → warm golden strong
  sun.color=lerpC('#e8eef0','#ffdf9e',t); sun.intensity=1.05+t*1.75;
  hemi.color=lerpC('#dfe8ee','#bfe0ff',t); hemi.groundColor=lerpC('#8a9088','#5a4a2e',t); hemi.intensity=1.0-t*0.1;
  amb.color=lerpC('#f2f5f2','#fff2d8',t); amb.intensity=0.5-t*0.15;
  // fog: close pale mist → far warm haze (the island "clears up when it gets to see you")
  const fc=lerpC('#dfe5e2','#f2d9a8',t);
  scene.fog=new THREE.Fog(fc, 130+t*260, 820+t*1400);
  renderer.setClearColor(fc);
  // cave & waterfall wake up as the island does
  caveLight.intensity=2+t*26; caveGlow.material.opacity=0.25+t*0.75;
  falls.visible=t>0.15; falls.material.opacity=Math.min(1,(t-0.15)*2);
}

/* ---------- terrain ---------- */
const loader0=new THREE.TextureLoader();
const SEG=260, geo=new THREE.PlaneGeometry(TERR*2.2,TERR*2.2,SEG,SEG);
geo.rotateX(-Math.PI/2);
const pos=geo.attributes.position,col=[];
const cSand=new THREE.Color('#fff5dc'),cGrass=new THREE.Color('#f4ffd8'),cLo=new THREE.Color('#c2d69a'),
      cRock=new THREE.Color('#cdbfa9'),cHi=new THREE.Color('#e8dcc4');
for(let i=0;i<pos.count;i++){
  const x=pos.getX(i),z=pos.getZ(i),y=height(x,z);pos.setY(i,y);
  const e=6,dy=height(x+e,z)-height(x-e,z),dz=height(x,z+e)-height(x,z-e);
  const slope=Math.min(1,Math.sqrt(dy*dy+dz*dz)/e*0.9);
  const c=new THREE.Color();
  if(y<1.2)c.copy(cSand);
  else{c.copy(cGrass).lerp(cLo,smooth(2,20,y));c.lerp(cLo,fbm(x*0.02,z*0.02)*0.55);if(slope>0.35)c.lerp(cRock,smooth(0.35,0.8,slope));
       if(y>34)c.lerp(cHi,smooth(34,60,y));}
  col.push(c.r,c.g,c.b);
}
geo.setAttribute('color',new THREE.Float32BufferAttribute(col,3));
geo.computeVertexNormals();
const gtex=new THREE.Texture();gtex.colorSpace=THREE.SRGBColorSpace;
gtex.wrapS=gtex.wrapT=THREE.RepeatWrapping;gtex.repeat.set(46,46);
{const im=new Image();im.onload=()=>{const c=document.createElement('canvas');c.width=im.width;c.height=im.height;
  const g=c.getContext('2d');g.filter='brightness(2.05) saturate(1.15)';g.drawImage(im,0,0);
  gtex.image=c;gtex.needsUpdate=true;};im.src='../assets/grass_ground.png';}
scene.add(new THREE.Mesh(geo,new THREE.MeshToonMaterial({vertexColors:true,gradientMap:GRAD,map:gtex})));

/* ---------- ocean ---------- */
const ocean=new THREE.Mesh(new THREE.PlaneGeometry(12000,12000),
  new THREE.MeshToonMaterial({color:0x2f83a0,gradientMap:GRAD,transparent:true,opacity:0.92}));
ocean.rotation.x=-Math.PI/2;ocean.position.y=0;scene.add(ocean);

/* ---------- the cave: a real recess in the north highland, warm light inside ---------- */
const caveX=-60, caveZ=-330, caveY=height(caveX,caveZ);
const rockMat=new THREE.MeshToonMaterial({color:0x6e6152,gradientMap:GRAD});
const arch=new THREE.Mesh(new THREE.TorusGeometry(20,7.5,10,18,Math.PI),rockMat);
arch.position.set(caveX,caveY+4,caveZ+14);scene.add(arch);
for(const[sx,sy,sz,r] of [[-19,2,16,7],[19,2,16,7],[-12,16,14,6],[12,16,14,6],[0,22,12,7]]){
  const b=new THREE.Mesh(new THREE.SphereGeometry(r,10,8),rockMat);
  b.position.set(caveX+sx,caveY+sy,caveZ+sz);b.scale.set(1.3,0.9,1);scene.add(b);}
const caveDark=new THREE.Mesh(new THREE.CircleGeometry(16,24),new THREE.MeshBasicMaterial({color:0x140d06}));
caveDark.position.set(caveX,caveY+7,caveZ+15);scene.add(caveDark);
const caveGlow=new THREE.Mesh(new THREE.CircleGeometry(17,24),
  new THREE.MeshBasicMaterial({color:0xffb347,transparent:true,opacity:1,blending:THREE.AdditiveBlending,depthWrite:false}));
caveGlow.position.set(caveX,caveY+7,caveZ+16);scene.add(caveGlow);
const caveLight=new THREE.PointLight(0xff9a3d,10,260,1.6);
caveLight.position.set(caveX,caveY+10,caveZ+24);scene.add(caveLight);

/* ---------- the waterfall: a living ribbon off the highland into a pool ---------- */
const fx=140, fz=-300, topY=height(fx,fz)+2;
const falls=new THREE.Mesh(new THREE.PlaneGeometry(16,topY,1,24),
  new THREE.MeshToonMaterial({color:0xeaf6ff,gradientMap:GRAD,transparent:true,opacity:1,side:THREE.DoubleSide}));
falls.position.set(fx,topY/2,fz+8);scene.add(falls);
const pool=new THREE.Mesh(new THREE.CircleGeometry(26,24),
  new THREE.MeshToonMaterial({color:0x9fd4de,gradientMap:GRAD,transparent:true,opacity:0.85}));
pool.rotation.x=-Math.PI/2;pool.position.set(fx,Math.max(0.4,height(fx,fz+26)+0.4),fz+26);scene.add(pool);

/* ---------- painted world objects ---------- */
const loader=new THREE.TextureLoader();
const shadowMat=new THREE.MeshBasicMaterial({color:0x1e3018,transparent:true,opacity:0.28,depthWrite:false});
function blobShadow(x,z,r){const m=new THREE.Mesh(new THREE.CircleGeometry(r,20),shadowMat);
  m.rotation.x=-Math.PI/2;m.position.set(x,height(x,z)+0.35,z);scene.add(m);}
function billboard(url,hgt,x,z,aspect){
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({alphaTest:0.2}));
  const tex=loader.load(url,t=>{t.colorSpace=THREE.SRGBColorSpace;
    sp.material.map=t;sp.material.needsUpdate=true;
    sp.scale.set(hgt*t.image.width/t.image.height,hgt,1);});
  sp.scale.set(hgt*(aspect||1),hgt,1);
  sp.position.set(x,height(x,z)+hgt*0.46,z);scene.add(sp);blobShadow(x,z,hgt*0.30);return sp;
}
const treeTex=loader.load('../assets/tree.png',t=>{t.colorSpace=THREE.SRGBColorSpace;});
const treeMat=new THREE.SpriteMaterial({map:treeTex,alphaTest:0.14});
const trng=mulberry32(SEED+7);
for(let i=0;i<46;i++){
  let x,z,y,k=0;
  do{x=(trng()*2-1)*TERR*0.7;z=(trng()*2-1)*TERR*0.7;y=height(x,z);k++;}while((y<2||y>30)&&k<50);
  if(y<2||y>30)continue;
  const s=new THREE.Sprite(treeMat);const sc=24+trng()*18;
  s.scale.set(sc,sc,1);s.position.set(x,y+sc*0.42,z);scene.add(s);blobShadow(x,z,sc*0.30);
}
billboard('../assets/house.png',48,-85,55,1.0);
const brightSp=billboard('../assets/bright.png',50,40,60,0.5);
{const gc=document.createElement('canvas');gc.width=gc.height=64;
 const gg=gc.getContext('2d');const grd=gg.createRadialGradient(32,32,2,32,32,30);
 grd.addColorStop(0,'rgba(255,240,200,1)');grd.addColorStop(0.35,'rgba(255,205,110,0.75)');grd.addColorStop(1,'rgba(255,190,90,0)');
 gg.fillStyle=grd;gg.fillRect(0,0,64,64);
 const gt=new THREE.CanvasTexture(gc);
 const g=new THREE.Sprite(new THREE.SpriteMaterial({map:gt,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));
 g.scale.set(6,6,1);g.position.set(36,height(40,60)+30,61);scene.add(g);
 const gl=new THREE.PointLight(0xffc95e,6,60,1.8);gl.position.copy(g.position);scene.add(gl);}
billboard('../assets/pine.png',46,120,-40,0.7);
billboard('../assets/rock.png',24,-28,140,1.1);

/* ---------- living grass: instanced wind-swayed blades ---------- */
const uTime={value:0};
{
  const blade=new THREE.PlaneGeometry(0.42,2.3,1,3);blade.translate(0,1.15,0);
  {const bp=blade.attributes.position;               // taper to a grass tip
   for(let i=0;i<bp.count;i++){const yy=bp.getY(i);const t=Math.max(0,Math.min(1,yy/2.3));
     bp.setX(i,bp.getX(i)*(1-t*0.92));}}
  const gmat=new THREE.MeshToonMaterial({color:0xffffff,gradientMap:GRAD,side:THREE.DoubleSide,vertexColors:false});
  gmat.onBeforeCompile=(sh)=>{sh.uniforms.uTime=uTime;
    sh.vertexShader='uniform float uTime;\n'+sh.vertexShader.replace('#include <begin_vertex>',
      '#include <begin_vertex>\nfloat swy=sin(uTime*1.7+float(gl_InstanceID)*0.61)*0.22;\ntransformed.x+=swy*transformed.y*0.28;');};
  const N=14000, inst=new THREE.InstancedMesh(blade,gmat,N);
  const grng=mulberry32(SEED+31), m=new THREE.Matrix4(), q=new THREE.Quaternion(), e=new THREE.Euler(),
        v=new THREE.Vector3(), sc=new THREE.Vector3(), cA=new THREE.Color('#55803a'), cB=new THREE.Color('#89a04e');
  let placed=0;
  for(let i=0;i<N*3&&placed<N;i++){
    const x=15+(grng()*2-1)*420, z=200+(grng()*2-1)*420, y=height(x,z);
    if(y<1.6||y>24)continue;
    e.set((grng()-0.5)*0.2,grng()*Math.PI,(grng()-0.5)*0.25);q.setFromEuler(e);
    const h2=0.55+grng()*0.75; sc.set(0.7+grng()*0.5,h2,1); v.set(x,y,z);
    m.compose(v,q,sc); inst.setMatrixAt(placed,m);
    inst.setColorAt(placed,new THREE.Color().copy(cA).lerp(cB,grng()));
    placed++;
  }
  inst.count=placed; inst.instanceMatrix.needsUpdate=true; if(inst.instanceColor)inst.instanceColor.needsUpdate=true;
  scene.add(inst);
}
/* ---------- first-person walking (keys + touch drag), portrait-first framing ---------- */
let px=15,pz=235,ang=-0.12,vel=0;
const keys={};addEventListener('keydown',e=>keys[e.key.toLowerCase()]=1);addEventListener('keyup',e=>keys[e.key.toLowerCase()]=0);
let touch=null;
addEventListener('pointerdown',e=>touch={x:e.clientX,y:e.clientY});
addEventListener('pointermove',e=>{if(touch){ang+=(e.clientX-touch.x)*0.004;vel=(touch.y-e.clientY)*0.6;touch={x:e.clientX,y:touch.y};}});
addEventListener('pointerup',()=>{touch=null;vel=0;});
setGrowth(GROWTH);
let t0=performance.now();
function frame(now){
  const dt=Math.min(0.05,(now-t0)/1000);t0=now;uTime.value=now*0.001;
  let f=(keys.w||keys.arrowup?1:0)-(keys.s||keys.arrowdown?1:0);
  ang+=((keys.d||keys.arrowright?1:0)-(keys.a||keys.arrowleft?1:0))*1.8*dt;
  const sp=f*95+vel;
  const nx=px+Math.sin(ang)*sp*dt, nz=pz-Math.cos(ang)*sp*dt;
  if(height(nx,nz)>0.8){px=nx;pz=nz;}
  const eye=height(px,pz)+11+Math.sin(now*0.004)*(Math.abs(sp)>2?0.5:0.12);
  camera.position.set(px,eye,pz);
  camera.lookAt(px+Math.sin(ang)*40, eye+6, pz-Math.cos(ang)*40);
  falls.material.map=null; // ribbon shimmer
  falls.position.x=fx+Math.sin(now*0.003)*0.6;
  sky.position.copy(camera.position);
  renderer.render(scene,camera);
  window.__ready=true;
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.fov=innerHeight>innerWidth?70:60;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script></body></html>
