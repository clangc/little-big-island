<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Island Explorer — 3D island prototype</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#0e3742}#c{display:block;width:100vw;height:100vh}
#hands{position:fixed;left:50%;bottom:-2vh;transform:translateX(-50%);height:52vh;pointer-events:none;z-index:10}</style>
</head><body><canvas id="c"></canvas>
<img id="hands" src="../assets/hands.png">
<script type="module">
import * as THREE from '../vendor/three.module.js';

/* ---------- seeded noise (unique island per seed) ---------- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const SEED = 12345;
const rng = mulberry32(SEED);
const OFF = rng()*1000, OFF2 = rng()*1000;
function vnoise(x,y){
  const xi=Math.floor(x),yi=Math.floor(y),xf=x-xi,yf=y-yi;
  const u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf);
  const h=(a,b)=>{let n=(Math.imul(a,374761393)+Math.imul(b,668265263))|0;n=Math.imul(n^(n>>>13),1274126177)|0;return((n>>>0)&1023)/1023;};
  const a=h(xi,yi),b=h(xi+1,yi),c=h(xi,yi+1),d=h(xi+1,yi+1);
  const ab=a+(b-a)*u,cd=c+(d-c)*u;return ab+(cd-ab)*v;
}
function fbm(x,y){let s=0,amp=0.5,f=1;for(let i=0;i<5;i++){s+=amp*vnoise(x*f+OFF,y*f+OFF2);f*=2;amp*=0.5;}return s;}
function smooth(a,b,t){t=Math.max(0,Math.min(1,(t-a)/(b-a)));return t*t*(3-2*t);}

const TERR = 900;                 // island world size
const WATER = 0;                  // sea level
function height(x,z){
  const nx=x/TERR, nz=z/TERR, r=Math.sqrt(nx*nx+nz*nz)*2;
  const island=1-smooth(0.62,1.04,r);            // radial falloff → surrounded by ocean
  const hills=fbm(x*0.0016,z*0.0016);            // rolling hills
  let h=island*(6+hills*22);
  const ridge=Math.max(0,(-nz-0.05));            // a highland rising toward the north
  h+=island*(ridge*70+ridge*ridge*90);
  return h-4;                                    // sink edges below the sea
}

/* ---------- renderer / scene ---------- */
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.outputColorSpace=THREE.SRGBColorSpace;
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(62,innerWidth/innerHeight,0.5,6000);

const HAZE=new THREE.Color('#f2d9a8');         // warm dusk horizon
scene.fog=new THREE.Fog(HAZE, 380, 2100);

/* toon gradient map for painterly banded shading */
function toonGrad(){const d=new Uint8Array([90,150,205,245]);const t=new THREE.DataTexture(d,d.length,1,THREE.RedFormat);t.needsUpdate=true;return t;}
const GRAD=toonGrad();

/* ---------- sky dome (dusk gradient) ---------- */
const sky=new THREE.Mesh(new THREE.SphereGeometry(4000,32,16),
  new THREE.ShaderMaterial({side:THREE.BackSide,uniforms:{
    top:{value:new THREE.Color('#2f6a97')},mid:{value:new THREE.Color('#c98f6a')},bot:{value:new THREE.Color('#f4dcaa')}},
    vertexShader:`varying vec3 vp;void main(){vp=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`varying vec3 vp;uniform vec3 top,mid,bot;void main(){float h=normalize(vp).y;
      vec3 c=h>0.0?mix(mid,top,smoothstep(0.0,0.55,h)):mix(mid,bot,smoothstep(0.0,-0.15,h));gl_FragColor=vec4(c,1.0);}`}));
scene.add(sky);

/* ---------- lights (golden hour) ---------- */
const sun=new THREE.DirectionalLight(0xffe6b0,2.1);sun.position.set(-600,420,-500);scene.add(sun);
scene.add(new THREE.HemisphereLight(0xbfe0ff,0x5a4a2e,0.75));
scene.add(new THREE.AmbientLight(0xfff2d8,0.35));

/* ---------- terrain ---------- */
const SEG=260;
const geo=new THREE.PlaneGeometry(TERR*2.2,TERR*2.2,SEG,SEG);
geo.rotateX(-Math.PI/2);
const pos=geo.attributes.position, col=[];
const cSand=new THREE.Color('#e9d3a0'),cGrass=new THREE.Color('#8aa653'),cGrassLo=new THREE.Color('#5f7d3c'),
      cRock=new THREE.Color('#7d6f5c'),cRockHi=new THREE.Color('#9a8b74');
for(let i=0;i<pos.count;i++){
  const x=pos.getX(i),z=pos.getZ(i),y=height(x,z);
  pos.setY(i,y);
  // slope from neighbours
  const e=6,dy=(height(x+e,z)-height(x-e,z)),dz=(height(x,z+e)-height(x,z-e));
  const slope=Math.min(1,Math.sqrt(dy*dy+dz*dz)/e*0.9);
  let c=new THREE.Color();
  if(y<1.2) c.copy(cSand);
  else{ c.copy(cGrass).lerp(cGrassLo,smooth(2,20,y)); if(slope>0.35)c.lerp(cRock,smooth(0.35,0.8,slope));
        if(y>34)c.lerp(cRockHi,smooth(34,60,y)); }
  col.push(c.r,c.g,c.b);
}
geo.setAttribute('color',new THREE.Float32BufferAttribute(col,3));
geo.computeVertexNormals();
const terrain=new THREE.Mesh(geo,new THREE.MeshToonMaterial({vertexColors:true,gradientMap:GRAD}));
scene.add(terrain);

/* ---------- ocean ---------- */
const ocean=new THREE.Mesh(new THREE.PlaneGeometry(12000,12000),
  new THREE.MeshToonMaterial({color:0x2f83a0,gradientMap:GRAD,transparent:true,opacity:0.92}));
ocean.rotation.x=-Math.PI/2;ocean.position.y=WATER;scene.add(ocean);

/* ---------- a few painted trees, anchored on the grass (billboards in 3D) ---------- */
const loader=new THREE.TextureLoader();
const treeTex=loader.load('../assets/tree.png',t=>{t.colorSpace=THREE.SRGBColorSpace;});
const treeMat=new THREE.SpriteMaterial({map:treeTex,alphaTest:0.14});
const trees=new THREE.Group();
const trng=mulberry32(SEED+7);
for(let i=0;i<40;i++){
  let x,z,y,tries=0;
  do{ x=(trng()*2-1)*TERR*0.7; z=(trng()*2-1)*TERR*0.7; y=height(x,z); tries++; }
  while((y<2||y>26)&&tries<40);
  if(y<2||y>26)continue;
  const s=new THREE.Sprite(treeMat);const sc=26+trng()*16;
  s.scale.set(sc,sc,1);s.position.set(x,y+sc*0.42,z);trees.add(s);
}
scene.add(trees);

/* ---------- painted objects placed on the land (billboards anchored in 3D) ---------- */
function billboard(url,hgt,x,z,aspect){
  const tex=loader.load(url,t=>{t.colorSpace=THREE.SRGBColorSpace;});
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,alphaTest:0.2}));
  sp.scale.set(hgt*(aspect||1),hgt,1);
  sp.position.set(x,height(x,z)+hgt*0.46,z);scene.add(sp);return sp;
}
billboard('../assets/house.png', 44, -70, 150, 1.0);
billboard('../assets/bright.png', 52, 30, 175, 0.5);
billboard('../assets/pine.png', 40, 120, 120, 0.7);

/* ---------- first-person view: standing on the meadow, looking across the island ---------- */
const px=34, pz=250;
camera.position.set(px, height(px,pz)+11, pz);
camera.lookAt(-16, 24, -TERR*0.42);

let t0=performance.now();
function frame(now){
  const dt=(now-t0)/1000;t0=now;
  ocean.material.opacity=0.9+Math.sin(now*0.0008)*0.03;
  sky.position.copy(camera.position);
  renderer.render(scene,camera);
  window.__ready=true;
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script></body></html>
