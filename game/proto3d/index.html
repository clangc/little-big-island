<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Island Explorer — 3D slice</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#0e3742}#c{display:block;width:100vw;height:100vh}
#hands{display:none;position:fixed;left:50%;bottom:-2vh;transform:translateX(-50%);height:38vh;pointer-events:none;z-index:10}</style>
</head><body><canvas id="c"></canvas>
<img id="hands" src="../assets/hands.png"><script>if(new URLSearchParams(location.search).get('hands'))document.getElementById('hands').style.display='block';</script>
<script type="module">
import * as THREE from '../vendor/three.module.js';
import {GLTFLoader} from '../vendor/GLTFLoader.js';

/* growth: 0 = Chapter 1 (pale, misty, tender) … 1 = Chapter 10 (earned golden dusk).
   The island's light literally grows with the child. Driven in-game by chapterOf(doneCount). */
const GROWTH = Math.max(0, Math.min(1, parseFloat(new URLSearchParams(location.search).get('growth') ?? '1')));

/* ---------- seeded terrain (unique island per child) ---------- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const SEED=12345, rng=mulberry32(SEED), OFF=rng()*1000, OFF2=rng()*1000;
function vnoise(x,y){const xi=Math.floor(x),yi=Math.floor(y),xf=x-xi,yf=y-yi;
  const u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf);
  const h=(a,b)=>{let n=(Math.imul(a,374761393)+Math.imul(b,668265263))|0;n=Math.imul(n^(n>>>13),1274126177)|0;return((n>>>0)&1023)/1023;};
  const a=h(xi,yi),b=h(xi+1,yi),c=h(xi,yi+1),d=h(xi+1,yi+1);
  const ab=a+(b-a)*u,cd=c+(d-c)*u;return ab+(cd-ab)*v;}
function fbm(x,y){let s=0,amp=0.5,f=1;for(let i=0;i<5;i++){s+=amp*vnoise(x*f+OFF,y*f+OFF2);f*=2;amp*=0.5;}return s;}
function smooth(a,b,t){t=Math.max(0,Math.min(1,(t-a)/(b-a)));return t*t*(3-2*t);}
const TERR=900;
function height(x,z){
  const nx=x/TERR,nz=z/TERR,r=Math.sqrt(nx*nx+nz*nz)*2;
  const island=1-smooth(0.62,1.04,r);
  let h=island*(6+fbm(x*0.0016,z*0.0016)*22);
  const ridge=Math.max(0,(-nz-0.02));
  h+=island*(ridge*80+ridge*ridge*260);
  h+=island*ridge*ridge*fbm(x*0.004+9,z*0.004+3)*90;
  return h-4;
}

/* ---------- renderer & scene ---------- */
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.outputColorSpace=THREE.SRGBColorSpace;
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(innerHeight>innerWidth?70:60,innerWidth/innerHeight,0.5,6000);

function toonGrad(){const d=new Uint8Array([118,155,192,224,245]);const t=new THREE.DataTexture(d,d.length,1,THREE.RedFormat);t.needsUpdate=true;return t;}
const GRAD=toonGrad();
const lerpC=(a,b,t)=>new THREE.Color(a).lerp(new THREE.Color(b),t);
const uTime={value:0};

/* ---------- sky dome ---------- */
const skyU={top:{value:new THREE.Color()},mid:{value:new THREE.Color()},bot:{value:new THREE.Color()},
  sunDir:{value:new THREE.Vector3(0,1,0)},glow:{value:new THREE.Color()},glowAmt:{value:0.5}};
const sky=new THREE.Mesh(new THREE.SphereGeometry(4000,32,16),new THREE.ShaderMaterial({side:THREE.BackSide,uniforms:skyU,
  vertexShader:`varying vec3 vp;void main(){vp=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader:`varying vec3 vp;uniform vec3 top,mid,bot,glow;uniform vec3 sunDir;uniform float glowAmt;
    void main(){vec3 d=normalize(vp);float h=d.y;
    vec3 c=h>0.0?mix(mid,top,smoothstep(0.0,0.5,h)):mix(mid,bot,smoothstep(0.0,-0.12,h));
    float s=max(dot(d,normalize(sunDir)),0.0);
    c+=glow*glowAmt*(pow(s,5.0)*0.45+pow(s,28.0)*0.65);        // warm halo lives around the sun
    c=mix(c,bot,exp(-abs(h)*14.0)*0.85);                       // cream haze band melts sea into sky
    c+=(fract(sin(dot(gl_FragCoord.xy,vec2(12.9898,78.233)))*43758.5453)-0.5)/128.0;  // dither kills banding
    gl_FragColor=vec4(c,1.0);}`}));
scene.add(sky);

/* ---------- lights ---------- */
const sun=new THREE.DirectionalLight(0xffffff,1);sun.position.set(-600,420,-500);scene.add(sun);
const hemi=new THREE.HemisphereLight(0xffffff,0x777777,0.8);scene.add(hemi);
const amb=new THREE.AmbientLight(0xffffff,0.3);scene.add(amb);

/* ---------- the sun itself, and slow painterly clouds ---------- */
const sunDisc=(()=>{const c=document.createElement('canvas');c.width=c.height=128;
 const g=c.getContext('2d'),gr=g.createRadialGradient(64,64,8,64,64,62);
 gr.addColorStop(0,'rgba(255,255,244,1)');gr.addColorStop(0.28,'rgba(255,238,196,0.9)');gr.addColorStop(1,'rgba(255,222,160,0)');
 g.fillStyle=gr;g.fillRect(0,0,128,128);
 const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true,depthWrite:false,fog:false}));
 s.position.copy(sun.position).normalize().multiplyScalar(3800);sky.add(s);return s;})();
const clouds=[];
{const c=document.createElement('canvas');c.width=256;c.height=128;const g=c.getContext('2d');
 g.filter='blur(6px)';g.fillStyle='#fff';                       // stacked cumulus puffs, soft flat base
 for(const[px,py,pr] of [[60,84,26],[92,70,30],[128,62,34],[164,70,30],[196,84,24],[92,92,28],[150,90,30],[120,86,32]]){
   g.beginPath();g.arc(px,py,pr,0,Math.PI*2);g.fill();}
 g.filter='none';
 const fade=g.createLinearGradient(0,94,0,122);
 fade.addColorStop(0,'rgba(0,0,0,0)');fade.addColorStop(1,'rgba(0,0,0,1)');
 g.globalCompositeOperation='destination-out';g.fillStyle=fade;g.fillRect(0,94,256,34);
 g.globalCompositeOperation='source-over';
 const ctex=new THREE.CanvasTexture(c), crng=mulberry32(SEED+99);
 for(let i=0;i<8;i++){
   const s=new THREE.Sprite(new THREE.SpriteMaterial({map:ctex,transparent:true,opacity:0.5+crng()*0.25,depthWrite:false,fog:false}));
   const d=1400+crng()*1400,th=crng()*Math.PI*2;
   s.position.set(Math.cos(th)*d,280+crng()*260,Math.sin(th)*d);
   const w=420+crng()*380;s.scale.set(w,w*0.5,1);scene.add(s);clouds.push(s);}}

/* ---------- THE LIGHT GROWS WITH THE CHILD ---------- */
function setGrowth(t){
  // sky: pale silvery morning → deep blue/gold dusk
  skyU.top.value=lerpC('#9fb9c8','#33608f',t);
  skyU.mid.value=lerpC('#cfd9d8','#d8a279',t);
  skyU.bot.value=lerpC('#e8ece6','#f6dfb2',t);
  skyU.glow.value=lerpC('#fff4dd','#ffb45e',t);
  skyU.glowAmt.value=0.30+t*0.55;
  // sun: cool weak & high → warm golden strong, sinking toward the horizon
  sun.color=lerpC('#e8eef0','#ffdf9e',t); sun.intensity=1.05+t*1.75;
  sun.position.set(-230+130*t,430-t*250,-580+1180*t);  // morning over the ridge → dusk setting over the southern sea
  skyU.sunDir.value.copy(sun.position).normalize();
  sunDisc.position.copy(sun.position).normalize().multiplyScalar(3800);
  const az=Math.atan2(sun.position.x,sun.position.z);   // the golden path follows the sun
  glint.rotation.z=-az;glint.position.set(Math.sin(az)*820,0.45,Math.cos(az)*820);
  hemi.color=lerpC('#dfe8ee','#bfe0ff',t); hemi.groundColor=lerpC('#8a9088','#5a4a2e',t); hemi.intensity=1.0-t*0.1;
  amb.color=lerpC('#f2f5f2','#fff2d8',t); amb.intensity=0.5-t*0.15;
  // fog: close pale mist → far warm haze (the island "clears up when it gets to see you")
  const fc=lerpC('#dfe5e2','#f2d9a8',t);
  scene.fog=new THREE.Fog(fc, 130+t*260, 820+t*1400);
  renderer.setClearColor(fc);
  // sea, sun and clouds ripen with the light
  oceanMat.color=lerpC('#8aa2ab','#3a93b0',t);
  shallowMat.color=lerpC('#b9c6c6','#ffffff',t);
  glint.material.opacity=0.1+t*0.45;
  sunDisc.material.color=lerpC('#f2f4f0','#ffcf7a',t);
  const sd=260+t*260;sunDisc.scale.set(sd,sd,1);
  for(const c of clouds)c.material.color=lerpC('#eef2f4','#ffd9b5',t);
  // cave & waterfall wake up as the island does
  caveLight.intensity=2+t*26; caveGlow.userData.base=0.25+t*0.75;
  falls.visible=t>0.15; falls.material.opacity=Math.min(1,(t-0.15)*2);
  for(const m of mist)m.visible=t>0.15;
  // fireflies belong to the earned dusk
  for(const f of flies)f.userData.op=Math.max(0,t-0.45)*1.7;
  // companions arrive by chapter (Bright 1 … Thread 9)
  const chapter=1+t*9;
  for(const c of COMPANIONS){const on=chapter>=c.ch-1e-6;
    c.sp.visible=on; if(c.sp.userData.shadow)c.sp.userData.shadow.visible=on;
    for(const o of c.extras)o.visible=on;}
}

/* ---------- terrain ---------- */
const loader0=new THREE.TextureLoader();
const SEG=260, geo=new THREE.PlaneGeometry(TERR*2.2,TERR*2.2,SEG,SEG);
geo.rotateX(-Math.PI/2);
const pos=geo.attributes.position,col=[];
const cSand=new THREE.Color('#fff5dc'),cGrass=new THREE.Color('#f4ffd8'),cLo=new THREE.Color('#c2d69a'),
      cRock=new THREE.Color('#cdbfa9'),cHi=new THREE.Color('#e8dcc4');
for(let i=0;i<pos.count;i++){
  const x=pos.getX(i),z=pos.getZ(i),y=height(x,z);pos.setY(i,y);
  const e=6,dy=height(x+e,z)-height(x-e,z),dz=height(x,z+e)-height(x,z-e);
  const slope=Math.min(1,Math.sqrt(dy*dy+dz*dz)/e*0.9);
  const c=new THREE.Color();
  if(y<2.2)c.copy(cSand);
  else{c.copy(cGrass).lerp(cLo,smooth(2,20,y));c.lerp(cLo,fbm(x*0.02,z*0.02)*0.55);if(slope>0.35)c.lerp(cRock,smooth(0.35,0.8,slope));
       if(y>34)c.lerp(cHi,smooth(34,60,y));}
  col.push(c.r,c.g,c.b);
}
geo.setAttribute('color',new THREE.Float32BufferAttribute(col,3));
geo.computeVertexNormals();
const gtex=new THREE.Texture();gtex.colorSpace=THREE.SRGBColorSpace;
gtex.wrapS=gtex.wrapT=THREE.MirroredRepeatWrapping;gtex.repeat.set(46,46);
gtex.anisotropy=renderer.capabilities.getMaxAnisotropy();
{const im=new Image();im.onload=()=>{const c=document.createElement('canvas');c.width=im.width;c.height=im.height;
  const g=c.getContext('2d');g.filter='brightness(2.05) saturate(1.15)';g.drawImage(im,0,0);
  gtex.image=c;gtex.needsUpdate=true;};im.src='../assets/grass_ground.png';}
scene.add(new THREE.Mesh(geo,new THREE.MeshToonMaterial({vertexColors:true,gradientMap:GRAD,map:gtex})));

/* ---------- ocean: living water, tropical shallows, lapping foam ---------- */
const waterTex=(()=>{const c=document.createElement('canvas');c.width=c.height=256;
 const g=c.getContext('2d'),wr=mulberry32(SEED+21);
 g.fillStyle='#e2e6e6';g.fillRect(0,0,256,256);
 for(let i=0;i<110;i++){const x=wr()*256,y=wr()*256,w=18+wr()*54,h2=1.6+wr()*3;
   g.fillStyle=i%3?`rgba(255,255,255,${0.22+wr()*0.3})`:`rgba(120,155,170,${0.2+wr()*0.24})`;
   g.beginPath();g.ellipse(x,y,w,h2,0,0,Math.PI*2);g.fill();}
 const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;
 t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(64,64);
 t.anisotropy=renderer.capabilities.getMaxAnisotropy();return t;})();
const oceanMat=new THREE.MeshToonMaterial({color:0x2f83a0,map:waterTex,gradientMap:GRAD,transparent:true,opacity:0.92});
oceanMat.onBeforeCompile=sh=>{sh.uniforms.uTime=uTime;
  sh.vertexShader='uniform float uTime;\n'+sh.vertexShader.replace('#include <begin_vertex>',
    '#include <begin_vertex>\ntransformed.z+=sin(position.x*0.012+uTime*0.9)*0.35+cos(position.y*0.017+uTime*1.3)*0.3;');};
const ocean=new THREE.Mesh(new THREE.PlaneGeometry(20000,20000,96,96),oceanMat);
ocean.rotation.x=-Math.PI/2;ocean.position.y=-0.25;scene.add(ocean);
/* the sun's golden path on the water */
const glint=(()=>{const c=document.createElement('canvas');c.width=128;c.height=512;
 const g=c.getContext('2d');g.save();g.translate(64,256);g.scale(0.27,1);
 const gr=g.createRadialGradient(0,0,8,0,0,250);
 gr.addColorStop(0,'rgba(255,236,180,0.9)');gr.addColorStop(0.5,'rgba(255,214,130,0.42)');gr.addColorStop(1,'rgba(255,200,110,0)');
 g.fillStyle=gr;g.beginPath();g.arc(0,0,250,0,Math.PI*2);g.fill();g.restore();
 const tex=new THREE.CanvasTexture(c);
 const m=new THREE.Mesh(new THREE.PlaneGeometry(170,1400),
   new THREE.MeshBasicMaterial({map:tex,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));
 m.rotation.x=-Math.PI/2;
 scene.add(m);return m;})();
/* shallows: turquoise where the seabed is close, melting into the deep */
const shallowTex=waterTex.clone();shallowTex.repeat.set(8,8);
shallowTex.anisotropy=renderer.capabilities.getMaxAnisotropy();shallowTex.needsUpdate=true;
const shallowMat=new THREE.MeshToonMaterial({vertexColors:true,map:shallowTex,gradientMap:GRAD,transparent:true,opacity:0.8,depthWrite:false});
{const sg=new THREE.PlaneGeometry(2400,2400,110,110);sg.rotateX(-Math.PI/2);
 const sp=sg.attributes.position,scol=[];
 const cShallow=new THREE.Color('#a5ead9'),cDeep=new THREE.Color('#357f9b');
 for(let i=0;i<sp.count;i++){const x=sp.getX(i),z=sp.getZ(i);
   const t2=smooth(-20,-0.4,height(x,z));
   const cc=new THREE.Color().copy(cDeep).lerp(cShallow,t2);scol.push(cc.r,cc.g,cc.b);}
 sg.setAttribute('color',new THREE.Float32BufferAttribute(scol,3));
 const sm=new THREE.Mesh(sg,shallowMat);sm.position.y=0.1;scene.add(sm);}
/* foam ring: traces the actual coastline of this island's seed */
const foam=(()=>{const SEGA=420,vs=[],idx=[];
 for(let i=0;i<SEGA;i++){const th=i/SEGA*Math.PI*2,cx=Math.cos(th),cz=Math.sin(th);
   let lo=140,hi=560;
   for(let k=0;k<26;k++){const mid=(lo+hi)/2;if(height(cx*mid,cz*mid)>0.45)lo=mid;else hi=mid;}
   vs.push(cx*(lo-4),1.05,cz*(lo-4), cx*(lo+9),0.95,cz*(lo+9));}
 for(let i=0;i<SEGA;i++){const a2=i*2,b2=((i+1)%SEGA)*2;idx.push(a2,b2,a2+1, b2,b2+1,a2+1);}
 const g2=new THREE.BufferGeometry();
 g2.setAttribute('position',new THREE.Float32BufferAttribute(vs,3));g2.setIndex(idx);
 const m2=new THREE.Mesh(g2,new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.45,depthWrite:false,side:THREE.DoubleSide}));
 scene.add(m2);return m2;})();

/* ---------- the cave: a real recess in the north highland, warm light inside ---------- */
const caveX=-60, caveZ=-330, caveY=height(caveX,caveZ);
const rockMat=new THREE.MeshToonMaterial({color:0x5f5244,gradientMap:GRAD});
/* a low rocky outcrop hugging the slope, with a small dark mouth and hearth light inside */
for(const[sx,sy,sz,r,ex,ey] of [[-13,2,9,10,1.4,0.7],[13,2,9,10,1.4,0.7],[0,9,5,11,1.5,0.75],[-6,0,13,6,1.2,0.65],[7,0,13,6,1.2,0.65]]){
  const b=new THREE.Mesh(new THREE.SphereGeometry(r,10,8),rockMat);
  b.position.set(caveX+sx,caveY+sy,caveZ+sz);b.scale.set(ex,ey,1);scene.add(b);}
const caveDark=new THREE.Mesh(new THREE.CircleGeometry(6.5,24),new THREE.MeshBasicMaterial({color:0x140d06}));
caveDark.position.set(caveX,caveY+4.5,caveZ+14);scene.add(caveDark);
const caveGlow=new THREE.Mesh(new THREE.CircleGeometry(4.6,24),
  new THREE.MeshBasicMaterial({color:0xffb347,transparent:true,opacity:1,blending:THREE.AdditiveBlending,depthWrite:false}));
caveGlow.position.set(caveX,caveY+3.8,caveZ+14.6);scene.add(caveGlow);
const caveLight=new THREE.PointLight(0xff9a3d,10,200,1.6);
caveLight.position.set(caveX,caveY+8,caveZ+22);scene.add(caveLight);

/* ---------- the waterfall: a living ribbon off the highland into a pool ---------- */
const fx=140, fz=-300, topY=height(fx,fz)+2;
const fallsTex=(()=>{const c=document.createElement('canvas');c.width=64;c.height=256;
 const g=c.getContext('2d'),fr=mulberry32(SEED+55);
 for(let i=0;i<30;i++){const x=fr()*64,w=1+fr()*3;
   g.fillStyle=`rgba(255,255,255,${0.25+fr()*0.55})`;g.fillRect(x,0,w,256);}
 const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(1,2);return t;})();
const falls=new THREE.Mesh(new THREE.PlaneGeometry(16,topY,1,24),
  new THREE.MeshToonMaterial({color:0xdff2ff,map:fallsTex,gradientMap:GRAD,transparent:true,opacity:1,side:THREE.DoubleSide}));
falls.position.set(fx,topY/2,fz+8);scene.add(falls);
const pool=new THREE.Mesh(new THREE.CircleGeometry(26,24),
  new THREE.MeshToonMaterial({color:0x9fd4de,gradientMap:GRAD,transparent:true,opacity:0.85}));
pool.rotation.x=-Math.PI/2;pool.position.set(fx,Math.max(0.4,height(fx,fz+26)+0.4),fz+26);scene.add(pool);
const mist=[];
{const mc=document.createElement('canvas');mc.width=mc.height=64;const mg=mc.getContext('2d');
 const gr=mg.createRadialGradient(32,32,4,32,32,30);
 gr.addColorStop(0,'rgba(255,255,255,0.85)');gr.addColorStop(1,'rgba(255,255,255,0)');
 mg.fillStyle=gr;mg.fillRect(0,0,64,64);const mt=new THREE.CanvasTexture(mc);
 for(let i=0;i<3;i++){const s=new THREE.Sprite(new THREE.SpriteMaterial({map:mt,transparent:true,opacity:0.4,depthWrite:false}));
   s.position.set(fx-8+i*8,Math.max(0.4,height(fx,fz+26)+0.4)+3+i*1.5,fz+20);
   s.scale.set(16+i*6,10+i*3,1);scene.add(s);mist.push(s);}}

/* ---------- fireflies: the island's small lights, earned with the dusk ---------- */
const flies=[];
{const fc=document.createElement('canvas');fc.width=fc.height=32;const fg=fc.getContext('2d');
 const gr=fg.createRadialGradient(16,16,1,16,16,15);
 gr.addColorStop(0,'rgba(255,244,180,1)');gr.addColorStop(0.4,'rgba(255,214,110,0.7)');gr.addColorStop(1,'rgba(255,200,90,0)');
 fg.fillStyle=gr;fg.fillRect(0,0,32,32);const ft=new THREE.CanvasTexture(fc);
 const frng=mulberry32(SEED+13);
 const homes=[[caveX,caveZ+40],[fx,fz+30],[120,-40],[-85,55]];
 for(let i=0;i<16;i++){const[hx,hz]=homes[i%homes.length];
   const x=hx+(frng()*2-1)*34,z=hz+(frng()*2-1)*34,y0=height(x,z)+2.5+frng()*5;
   const s=new THREE.Sprite(new THREE.SpriteMaterial({map:ft,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false}));
   s.scale.set(1.7,1.7,1);s.position.set(x,y0,z);s.userData={x0:x,y0};scene.add(s);flies.push(s);}}

/* ---------- painted world objects ---------- */
const loader=new THREE.TextureLoader();
const shadowMat=new THREE.MeshBasicMaterial({color:0x1e3018,transparent:true,opacity:0.28,depthWrite:false});
function blobShadow(x,z,r){const m=new THREE.Mesh(new THREE.CircleGeometry(r,20),shadowMat);
  m.rotation.x=-Math.PI/2;m.position.set(x,height(x,z)+0.35,z);scene.add(m);return m;}
function billboard(url,hgt,x,z,aspect){
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({alphaTest:0.2}));
  const tex=loader.load(url,t=>{t.colorSpace=THREE.SRGBColorSpace;
    sp.material.map=t;sp.material.needsUpdate=true;
    sp.scale.set(hgt*t.image.width/t.image.height,hgt,1);});
  sp.scale.set(hgt*(aspect||1),hgt,1);
  sp.position.set(x,height(x,z)+hgt*0.46,z);scene.add(sp);
  sp.userData.shadow=blobShadow(x,z,hgt*0.30);return sp;
}
function groundY(x,z){let m=height(x,z);            // lowest point under the footprint — nothing floats
  for(const[dx,dz] of [[4,0],[-4,0],[0,4],[0,-4]])m=Math.min(m,height(x+dx,z+dz));return m;}
const mkTreeMat=u=>new THREE.SpriteMaterial({map:loader.load(u,t=>{t.colorSpace=THREE.SRGBColorSpace;}),alphaTest:0.3});
const treeMat=mkTreeMat('../assets/tree.png'),pineMat=mkTreeMat('../assets/pine.png'),autumnMat=mkTreeMat('../assets/tree_autumn.png');
const trng=mulberry32(SEED+7);
const roundTrees=[];                                    // flat cutouts near the player get 3D-lifted below
for(let i=0;i<40;i++){
  let x,z,y,k=0;

/* ---------- the real tree: painted art lifted to a 3D mesh (Higgsfield image_to_3d) ---------- */
new GLTFLoader().load('../assets/models/tree.glb',g=>{
  const root=g.scene;
  root.traverse(o=>{if(o.isMesh){const old=o.material;
    o.material=new THREE.MeshToonMaterial({map:old.map||null,color:0xd6ddbf,gradientMap:GRAD});  // settle the lime toward the painted palette
    if(o.material.map)o.material.map.colorSpace=THREE.SRGBColorSpace;}});
  const bb=new THREE.Box3().setFromObject(root);
  const size=bb.getSize(new THREE.Vector3()), ctr=bb.getCenter(new THREE.Vector3());
  root.position.set(-ctr.x,-bb.min.y,-ctr.z);          // stand centered on its own feet
  const proto=new THREE.Group();proto.add(root);
  const rrng=mulberry32(SEED+3);
  for(const t of roundTrees.slice(0,14)){               // nearest cutouts become real trees
    t.s.removeFromParent();
    const inst=proto.clone();
    inst.scale.setScalar(t.sc/size.y);
    inst.rotation.y=rrng()*Math.PI*2;
    inst.position.set(t.x,groundY(t.x,t.z)-0.5,t.z);
    scene.add(inst);
  }
});

/* ---------- living grass: painted wind-swayed tuft cards (crossed planes) ---------- */
{
  const tuftTex=(()=>{const c=document.createElement('canvas');c.width=128;c.height=128;
    const g=c.getContext('2d'),gr2=mulberry32(SEED+77);
    for(let i=0;i<9;i++){const bx=20+gr2()*88,tipx=bx+(gr2()*2-1)*34,w=5+gr2()*5,h3=70+gr2()*50;
      const grad=g.createLinearGradient(0,128,0,128-h3);
      grad.addColorStop(0,'#39641f');grad.addColorStop(0.7,'#5b842c');grad.addColorStop(1,'#8cab48');
      g.fillStyle=grad;g.beginPath();
      g.moveTo(bx-w,128);g.quadraticCurveTo(bx-w*0.4,128-h3*0.6,tipx,128-h3);
      g.quadraticCurveTo(bx+w*0.4,128-h3*0.6,bx+w,128);g.closePath();g.fill();}
    const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;return t;})();
  const card=new THREE.PlaneGeometry(3.4,2.5);card.translate(0,1.22,0);
  const gmat=new THREE.MeshToonMaterial({map:tuftTex,alphaTest:0.35,gradientMap:GRAD,side:THREE.DoubleSide});
  gmat.onBeforeCompile=(sh)=>{sh.uniforms.uTime=uTime;
    sh.vertexShader='uniform float uTime;\n'+sh.vertexShader.replace('#include <begin_vertex>',
      '#include <begin_vertex>\nfloat swy=sin(uTime*1.7+float(gl_InstanceID)*0.61)*0.22;\ntransformed.x+=swy*transformed.y*0.28;');};
  const N=14000, grng=mulberry32(SEED+31);
  const instA=new THREE.InstancedMesh(card,gmat,N), instB=new THREE.InstancedMesh(card,gmat,N);
  const m=new THREE.Matrix4(), q=new THREE.Quaternion(), e=new THREE.Euler(),
        v=new THREE.Vector3(), sc=new THREE.Vector3(), tint=new THREE.Color();
  let placed=0;
  for(let i=0;i<N*3&&placed<N;i++){
    const x=15+(grng()*2-1)*330, z=200+(grng()*2-1)*330, y=height(x,z);
    if(y<1.6||y>24)continue;
    const ry=grng()*Math.PI, s2=0.75+grng()*0.65;
    v.set(x,y-0.3,z); sc.set(s2,0.7+grng()*0.6,1);
    e.set(0,ry,0);q.setFromEuler(e);m.compose(v,q,sc);instA.setMatrixAt(placed,m);
    e.set(0,ry+Math.PI/2,0);q.setFromEuler(e);m.compose(v,q,sc);instB.setMatrixAt(placed,m);
    const b2=0.88+grng()*0.32;tint.setRGB(b2,b2,b2);
    instA.setColorAt(placed,tint);instB.setColorAt(placed,tint);
    placed++;
  }
  for(const inst of [instA,instB]){inst.count=placed;inst.instanceMatrix.needsUpdate=true;
    if(inst.instanceColor)inst.instanceColor.needsUpdate=true;scene.add(inst);}
}
/* ---------- first-person walking (keys + touch drag), portrait-first framing ---------- */
const Q=new URLSearchParams(location.search);
let px=parseFloat(Q.get('x')??'15'),pz=parseFloat(Q.get('z')??'235'),vel=0,
    ang=parseFloat(Q.get('ang')??'-0.12');
const keys={};addEventListener('keydown',e=>keys[e.key.toLowerCase()]=1);addEventListener('keyup',e=>keys[e.key.toLowerCase()]=0);
let touch=null;
addEventListener('pointerdown',e=>touch={x:e.clientX,y:e.clientY});
addEventListener('pointermove',e=>{if(touch){ang+=(e.clientX-touch.x)*0.004;vel=(touch.y-e.clientY)*0.6;touch={x:e.clientX,y:touch.y};}});
addEventListener('pointerup',()=>{touch=null;vel=0;});
setGrowth(GROWTH);
let t0=performance.now();
function frame(now){
  const dt=Math.min(0.05,(now-t0)/1000);t0=now;uTime.value=now*0.001;
  let f=(keys.w||keys.arrowup?1:0)-(keys.s||keys.arrowdown?1:0);
  ang+=((keys.d||keys.arrowright?1:0)-(keys.a||keys.arrowleft?1:0))*1.8*dt;
  const sp=f*95+vel;
  const nx=px+Math.sin(ang)*sp*dt, nz=pz-Math.cos(ang)*sp*dt;
  if(height(nx,nz)>0.8){px=nx;pz=nz;}
  const eye=height(px,pz)+11+(Math.abs(sp)>2?Math.sin(now*0.004)*0.5:0);  // bob only while walking
  camera.position.set(px,eye,pz);
  camera.lookAt(px+Math.sin(ang)*40, eye+6, pz-Math.cos(ang)*40);
  fallsTex.offset.y=-(now*0.0006)%1;
  falls.position.x=fx+Math.sin(now*0.003)*0.6;
  caveGlow.material.opacity=(caveGlow.userData.base??0.6)*(0.9+0.1*Math.sin(now*0.006));
  foam.material.opacity=0.52+0.2*Math.sin(now*0.0016);
  for(let i=0;i<mist.length;i++)mist[i].material.opacity=0.26+0.2*Math.sin(now*0.0011+i*2.1);
  for(let i=0;i<flies.length;i++){const f=flies[i];
    f.material.opacity=(f.userData.op??0)*(0.75+0.25*Math.sin(now*0.004+i*2.9));
    f.position.y=f.userData.y0+Math.sin(now*0.0012+i*1.7)*1.4;
    f.position.x=f.userData.x0+Math.sin(now*0.0007+i*2.3)*2.2;}
  for(const c of clouds){c.position.x+=dt*3.5;if(c.position.x>2600)c.position.x=-2600;}
  waterTex.offset.x=(now*3e-5)%1;waterTex.offset.y=(now*1.7e-5)%1;
  shallowTex.offset.x=(now*4e-5)%1;shallowTex.offset.y=(now*2.3e-5)%1;
  sky.position.copy(camera.position);
  renderer.render(scene,camera);
  window.__ready=true;
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
