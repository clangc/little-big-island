<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Island Explorer — The Little Big Island</title>
<meta name="theme-color" content="#0e3742">
<meta name="description" content="Walk on your own island. Do real things in the real world — kindness, courage, laughter — and watch your island grow. From the book The Little Big Island by Bianca Lang.">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  :root{
    --ink:#26333e; --paper:#faf4e6; --card:#ffffff;
    --sea:#2e7d8f; --sea-deep:#1f5d6e; --sand:#e9d8a6; --leaf:#4c9a6a;
    --accent:#e07a3f; --gold:#c9a227; --soft:#7d8a94;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; overflow:hidden; overscroll-behavior:none;}
  body{
    background:#0e3742; color:var(--ink);
    font-family:Georgia,'Times New Roman',serif;
    touch-action:none;
  }
  #c{display:block; width:100vw; height:100vh;}
  button{font-family:inherit; cursor:pointer;}
  img.spr{image-rendering:auto; vertical-align:middle;}

  .topbar{
    position:fixed; top:0; left:0; right:0; display:flex; align-items:center; gap:7px;
    padding:8px 10px; pointer-events:none; z-index:20; flex-wrap:wrap;
  }
  /* ---- ornate wood + parchment HUD (storybook / adventure-game look) ---- */
  .plate{
    background:linear-gradient(#fbf1d6,#eeddb0); border:2px solid #7a5a34; border-radius:14px;
    padding:7px 14px; color:#4a3418; pointer-events:auto;
    box-shadow:inset 0 0 0 2px #d9bd82, inset 0 2px 3px rgba(255,255,255,.6),
      0 4px 0 #6b4d2c, 0 9px 16px rgba(18,30,20,.4);
  }
  .who{font-size:14px; line-height:1.22;}
  .who .iname{font-weight:bold; color:#7a3d18; font-size:15px; letter-spacing:.2px;}
  .who .ename{color:#9a7c50; font-style:italic; font-size:12px;}
  .chap{font-size:13px; color:#7a5c12; font-weight:bold;}
  .spacer{flex:1;}
  .coins{font-size:17px; font-weight:bold; color:#6b4a10; white-space:nowrap; display:flex; align-items:center; gap:7px;
    text-shadow:0 1px 0 rgba(255,255,255,.5);}
  .coin-ic{
    width:24px; height:24px; border-radius:50%; display:inline-block; position:relative;
    background:radial-gradient(circle at 35% 30%,#fff4c6,#ffd869 42%,#c9971f 78%,#a67714);
    border:2px solid #8a6b1a;
    box-shadow:0 1px 3px rgba(0,0,0,.4), inset 0 0 0 2px rgba(255,255,255,.28), inset 0 -2px 3px rgba(120,80,10,.5);
  }
  .coin-ic::after{content:""; position:absolute; inset:5px; border-radius:50%;
    border:1.5px solid rgba(138,107,26,.55); box-shadow:inset 0 1px 2px rgba(255,255,255,.5);}
  .tbtn{
    border:2px solid #4a3116; border-radius:13px; color:#fff6e2; font-size:14px; font-weight:700;
    padding:9px 15px; pointer-events:auto; white-space:nowrap; text-shadow:0 1px 2px rgba(0,0,0,.5);
    background:linear-gradient(#b9814a,#8a5a30);
    box-shadow:inset 0 2px 0 rgba(255,226,180,.45), inset 0 -3px 6px rgba(0,0,0,.32),
      0 4px 0 #3c2812, 0 8px 13px rgba(0,0,0,.35);
    transition:transform .05s, box-shadow .05s;
  }
  .tbtn:active{transform:translateY(3px);
    box-shadow:inset 0 2px 0 rgba(255,226,180,.3), inset 0 -1px 3px rgba(0,0,0,.3), 0 1px 0 #3c2812;}
  .tbtn.warm{background:linear-gradient(#ec9a5c,#cc6a34); border-color:#7a3d18; box-shadow:inset 0 2px 0 rgba(255,226,180,.45), inset 0 -3px 6px rgba(0,0,0,.3), 0 4px 0 #7a3d18, 0 8px 13px rgba(0,0,0,.35);}
  .tbtn.gold{background:linear-gradient(#efc75f,#b8892a); border-color:#7a5a18; color:#43310a; text-shadow:0 1px 1px rgba(255,255,255,.35); box-shadow:inset 0 2px 0 rgba(255,244,200,.55), inset 0 -3px 6px rgba(120,80,10,.35), 0 4px 0 #7a5a18, 0 8px 13px rgba(0,0,0,.35);}
  .tbtn.gray{background:linear-gradient(#93a4ad,#61727a); border-color:#3a474e; box-shadow:inset 0 2px 0 rgba(255,255,255,.35), inset 0 -3px 6px rgba(0,0,0,.28), 0 4px 0 #3a474e, 0 8px 13px rgba(0,0,0,.35);}
  .tbtn.on{background:linear-gradient(#3aa47c,#1f6650); border-color:#123c30; color:#fff;
    box-shadow:inset 0 0 0 2px #ffd76e, inset 0 2px 0 rgba(200,255,230,.3), 0 4px 0 #123c30, 0 8px 13px rgba(0,0,0,.35);}

  #bubble{
    position:fixed; left:50%; transform:translateX(-50%); bottom:120px; max-width:min(560px,92vw);
    background:linear-gradient(#fff8e6,#f6e6c0); border:2px solid #a5824a; border-radius:16px;
    padding:11px 18px; font-size:15px; line-height:1.45; z-index:30; display:none; color:#4a3418;
    box-shadow:inset 0 0 0 2px #e7d4a2, 0 7px 20px rgba(10,40,50,.42);
  }
  #bubble .spk{font-weight:bold; color:var(--accent); margin-right:6px;}

  #toast{
    position:fixed; top:66px; left:50%; transform:translateX(-50%);
    background:linear-gradient(#fbf1d6,#eeddb0); color:#4a3418; border:2px solid #7a5a34;
    border-radius:999px; padding:8px 18px; font-size:15px; font-weight:600;
    z-index:40; display:none; box-shadow:inset 0 0 0 2px #d9bd82, 0 4px 14px rgba(0,0,0,.3);
  }
  #ctlhint{
    position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
    color:rgba(250,244,230,.85); font-size:13px; font-style:italic; z-index:15;
    text-shadow:0 1px 3px rgba(0,0,0,.5); pointer-events:none; text-align:center;
  }
  #mini{
    position:fixed; right:14px; bottom:14px; width:120px; height:120px; z-index:18;
    border-radius:50%; border:5px solid #7a5a34; background:#1f5d6e;
    box-shadow:inset 0 0 0 3px #d9bd82, 0 0 0 3px #5a3d24, 0 6px 16px rgba(0,0,0,.5);
  }

  #actionbtn{
    position:fixed; left:50%; transform:translateX(-50%); bottom:64px; z-index:28;
    display:none; border:2px solid #7a5a18; background:linear-gradient(#efc75f,#c9971f); color:#43310a;
    font-weight:bold; font-size:16px; padding:12px 24px; border-radius:14px;
    text-shadow:0 1px 1px rgba(255,255,255,.4);
    box-shadow:inset 0 2px 0 rgba(255,244,200,.6), inset 0 -3px 6px rgba(120,80,10,.3), 0 4px 0 #7a5a18, 0 9px 16px rgba(0,0,0,.4);
  }
  #actionbtn:active{transform:translateX(-50%) translateY(3px);}

  #joy{
    position:fixed; left:18px; bottom:18px; width:130px; height:130px; z-index:25;
    border-radius:50%; background:rgba(250,244,230,.16); border:2px solid rgba(250,244,230,.4);
    display:none; touch-action:none;
  }
  #knob{
    position:absolute; left:50%; top:50%; width:54px; height:54px; border-radius:50%;
    background:rgba(250,244,230,.85); transform:translate(-50%,-50%);
    box-shadow:0 3px 8px rgba(0,0,0,.3);
  }
  .touchy #joy{display:block;}
  body.drawer-open #actionbtn{bottom:210px;}
  body.drawer-open #bubble{bottom:250px;}
  body.drawer-open #mini{bottom:210px;}
  body.drawer-open #ctlhint{display:none;}

  #drawer{
    position:fixed; left:0; right:0; bottom:0; z-index:26; display:none;
    background:rgba(250,244,230,.97); border-top:2px solid #e0d5b8;
    box-shadow:0 -8px 24px rgba(10,40,50,.3); padding:8px 8px 10px;
  }
  #drawer .tabs{display:flex; gap:6px; overflow-x:auto; padding-bottom:6px; scrollbar-width:none;}
  #drawer .tab{
    border:none; border-radius:999px; padding:7px 13px; font-size:13px;
    background:#eee3c8; color:#5a4d2e; flex:0 0 auto;
  }
  #drawer .tab.on{background:var(--sea); color:#fff;}
  #items{display:flex; gap:8px; overflow-x:auto; padding:4px 2px; scrollbar-width:none;}
  .chip{
    flex:0 0 auto; width:68px; border:2px solid #e0d5b8; border-radius:12px; background:#fff;
    padding:5px 2px 4px; text-align:center; line-height:1.05;
  }
  .chip img{width:34px; height:34px; object-fit:contain;}
  .chip small{display:block; font-size:10.5px; color:#7a5c12; font-family:Georgia,serif; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .chip.on{border-color:var(--accent); background:#fff3e8;}
  .chip.cant{opacity:.45;}
  #drawer .hint{font-size:12px; color:var(--soft); font-style:italic; text-align:center; margin-top:4px;}

  .veil{
    position:fixed; inset:0; background:rgba(14,45,55,.55); z-index:50;
    display:none; align-items:center; justify-content:center; padding:14px;
  }
  .veil.show{display:flex;}
  .modal{
    background:var(--card); border-radius:18px; max-width:580px; width:100%;
    max-height:92vh; overflow-y:auto; padding:26px 26px 22px;
    box-shadow:0 16px 50px rgba(0,0,0,.4); border:1px solid #eee3cd;
  }
  .kicker{
    text-transform:uppercase; letter-spacing:2.5px; font-size:11px;
    color:var(--accent); font-weight:bold; margin-bottom:8px;
  }
  .modal h1{font-size:26px; color:var(--sea-deep); line-height:1.2; margin-bottom:6px;}
  .modal .sub{color:var(--soft); font-style:italic; margin-top:8px; line-height:1.5; font-size:14px;}
  .qtreasure{
    display:inline-flex; align-items:center; gap:7px; background:#fffbef; border:1px solid #e3cf96; border-radius:999px;
    padding:5px 14px; font-size:13.5px; color:#7a5c12; margin-bottom:12px;
  }
  .qtreasure img{width:20px;height:20px;}
  .qtext{font-size:19px; line-height:1.5; margin:6px 0 10px;}
  .qvoice{
    margin-top:10px; padding:10px 14px; border-left:4px solid var(--gold);
    background:#fffbef; border-radius:0 10px 10px 0; font-style:italic; font-size:14.5px; line-height:1.5;
  }
  .btnrow{display:flex; gap:10px; flex-wrap:wrap; margin-top:18px;}
  .big{
    border:none; background:var(--sea); color:#fff; font-size:16.5px; padding:12px 22px;
    border-radius:999px;
  }
  .big.warm{background:var(--accent);}
  .big.ghost{background:transparent; color:var(--sea-deep); border:2px solid var(--sea);}
  .big:active{transform:translateY(1px);}
  .big:disabled{opacity:.45;}
  .deckmeter{font-size:12.5px; color:var(--soft); font-style:italic; margin-top:12px;}

  .deed{
    border:2px solid #eadfc4; background:#fbf7ec; border-radius:14px; padding:12px 14px; margin:9px 0;
    display:flex; gap:12px; align-items:center;
  }
  .deed img{width:44px;height:44px;flex:0 0 auto;}
  .deed .dt{font-weight:bold; color:var(--sea-deep); font-size:15.5px;}
  .deed .dd{font-size:13.5px; line-height:1.45; margin-top:2px;}
  .deed .st{font-size:12px; font-style:italic; color:var(--soft); margin-top:3px;}
  .deed.done{border-color:#b5cfa8; background:#f0f7ec;}
  .deed.locked{opacity:.55;}
  .deed button{margin-top:6px;}
  .sm{border:none; background:var(--accent); color:#fff; border-radius:999px; padding:7px 14px; font-size:13.5px;}
  .sm.blue{background:var(--sea);}

  .swgrid{display:flex; flex-wrap:wrap; gap:8px; margin:8px 0;}
  .sw{
    width:44px; height:44px; border-radius:50%; border:3px solid #e0d5b8;
  }
  .sw.on{border-color:var(--accent); outline:2px solid var(--accent);}
  .field{margin:10px 0;}
  .field label{font-size:13px; color:var(--soft); display:block; margin-bottom:4px;}
  .field input,.field select{
    font-family:inherit; font-size:17px; padding:10px 12px;
    border:2px solid #e0d5b8; border-radius:10px; background:#fbf7ec; color:var(--ink);
  }
  .field input{width:100%;}
  .brow{display:flex; gap:8px;}
  .plist{margin:12px 0; display:flex; flex-direction:column; gap:8px;}
  .prow{
    display:flex; align-items:center; gap:10px; border:2px solid #eadfc4; background:#fbf7ec;
    border-radius:12px; padding:10px 12px; font-size:16px; text-align:left; width:100%;
  }
  .prow:hover{border-color:var(--sea);}
  .prow .pdot{width:26px;height:26px;border-radius:50%;border:2px solid var(--ink);flex:0 0 auto;}
  .prow .pmeta{font-size:12px; color:var(--soft); font-style:italic;}
  .credit{margin-top:14px; text-align:center; font-size:11.5px; color:#a89f8a;}

  #confetti{position:fixed; inset:0; pointer-events:none; z-index:60;}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="topbar" id="topbar" style="display:none">
  <div class="plate who"><span class="iname" id="ui_island"></span><br><span class="ename" id="ui_explorer"></span></div>
  <div class="plate chap" id="ui_chapter">Chapter 1</div>
  <div class="spacer"></div>
  <div class="plate coins"><span class="coin-ic"></span><span id="ui_coins">0</span></div>
  <button class="tbtn warm" id="btn_quest">Quest</button>
  <button class="tbtn gold" id="btn_deeds">Big Deeds</button>
  <button class="tbtn" id="btn_build">Build</button>
  <button class="tbtn gray" id="btn_sound" title="Sound on/off">Sound</button>
  <button class="tbtn gray" id="btn_switch">Switch</button>
</div>

<div id="bubble"></div>
<div id="toast"></div>
<div id="ctlhint"></div>
<canvas id="mini" width="300" height="220"></canvas>
<button id="actionbtn"></button>
<div id="joy"><div id="knob"></div></div>

<div id="drawer">
  <div class="tabs" id="tabs"></div>
  <div id="items"></div>
  <div class="hint" id="drawhint"></div>
</div>

<div class="veil" id="veil"><div class="modal" id="modal"></div></div>
<canvas id="confetti"></canvas>
<script>
"use strict";
/* =============================================================
   THE ISLAND EXPLORER v2 — the First-Person Update
   World & words (c) Bianca Lang — The Little Big Island
   New: first-person walking (you only see your hands) · fly up to build
   · everything hand-drawn, zero emojis · companions arrive chapter by
   chapter (full cast by Chapter 10) · BIG DEEDS: big real-life stuff
   earns big island stuff · the island can GROW · birthdays (Kazoo
   sneaks over at night and leaves cake) · your old islands carry over.
   ============================================================= */

const TRE = {

};

const QUESTS = [

["spark","Find the prettiest thing in your house that nobody ever looks at. Look at it properly."],

["spark","Count the stars for one minute tonight. No stars? Count the lights."],
["spark","Tell someone about something you're looking forward to."],
["horn","Make a grown-up laugh. For real. Fake laughs don't count."],

["note","Close your eyes and design an island for someone you love."],

["note","Build something out of whatever's in the room. Give it a name."],

["seed","Get someone a glass of water BEFORE they ask. Sneaky kindness is the best kindness."],
["seed","Give something away today. Something real — not something broken."],

const PRAISE = {
  spark:["Pocket sunrise. Called it.","See? The island just got a little clearer.","Not bad for someone who doesn't even pack snacks.","I'm putting this in my guide report. Five stars."],
  horn:["HA! I heard that laugh from HERE!","That deserves a horn blast! Sorry, tree.","Ten out of ten! The tree is STILL giggling!","You win Try Not To Laugh. Everyone loses. It's wonderful."],
  note:["The Note hums, pleased. Still no keeper. Still suspicious. Still beautiful.","The map's blank edge just got smaller. You did that.","Somewhere, an unimagined thing thanks you for imagining it."],
  seed:["Somewhere, a raisin is proud of you.","That's exactly how gardens start. Exactly like that.","Small gift. Counts double. Rules are rules.","Something just sprouted in the cracked ground. Go look."],

<script>
"use strict";
/* ================== hand-drawn sprite factory (zero emojis) ================== */
const INK="#31404b";
function mkc(w,h){const c=document.createElement("canvas");c.width=w;c.height=h;return c;}
/* dimensional shading baked onto every sprite: a soft top-light, a grounded
   bottom shadow, and a warm sun-side glow — turns flat fills into illustrated form.
   Uses source-atop so it only ever touches the drawn shape, never the background. */
function shade(g,w,h){
  g.save();
  g.globalCompositeOperation="source-atop";
  const lg=g.createLinearGradient(0,0,0,h);      // volume: lit top → shadowed base
  lg.addColorStop(0,"rgba(255,250,236,0.26)");
  lg.addColorStop(0.46,"rgba(255,255,255,0)");
  lg.addColorStop(1,"rgba(38,54,68,0.26)");
  g.fillStyle=lg;g.fillRect(0,0,w,h);
  const rg=g.createRadialGradient(w*0.34,h*0.30,1,w*0.34,h*0.30,w*0.95); // warm sun from upper-left
  rg.addColorStop(0,"rgba(255,238,196,0.24)");rg.addColorStop(1,"rgba(255,238,196,0)");
  g.fillStyle=rg;g.fillRect(0,0,w,h);
  g.restore();
}
function sp(fn,w,h){w=w||64;h=h||64;const c=mkc(w*2,h*2);const g=c.getContext("2d");
  g.scale(2,2);g.lineJoin="round";g.lineCap="round";fn(g);shade(g,w,h);return c;}
function pth(g,f,o){if(f){g.fillStyle=f;g.fill();}if(o!==false){g.strokeStyle=INK;g.lineWidth=2.2;g.stroke();}}
function el(g,x,y,rx,ry,f,o){g.beginPath();g.ellipse(x,y,rx,ry,0,0,7);pth(g,f,o);}
function ci(g,x,y,r,f,o){el(g,x,y,r,r,f,o);}
function rr(g,x,y,w,h,r,f,o){g.beginPath();g.roundRect(x,y,w,h,r);pth(g,f,o);}
function poly(g,pts,f,o){g.beginPath();g.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++)g.lineTo(pts[i][0],pts[i][1]);g.closePath();pth(g,f,o);}
function line(g,x1,y1,x2,y2,c,w){g.beginPath();g.moveTo(x1,y1);g.lineTo(x2,y2);
  g.strokeStyle=c||INK;g.lineWidth=w||2.2;g.stroke();}
function dot(g,x,y,r){ci(g,x,y,r||1.7,INK,false);}
function smile(g,x,y,r){g.beginPath();g.arc(x,y,r,0.25*Math.PI,0.75*Math.PI);
  g.strokeStyle=INK;g.lineWidth=1.8;g.stroke();}
/* proper flower petals: elongated ovals radiating outward (not blobby circles) */
function petals(g,x,y,n,pr,dist,f){for(let i=0;i<n;i++){const a=i/n*Math.PI*2;
  g.save();g.translate(x+Math.cos(a)*dist,y+Math.sin(a)*dist);g.rotate(a);
  g.beginPath();g.ellipse(0,0,pr*1.35,pr*0.72,0,0,7);pth(g,f);g.restore();}}
function trunk(g,x,y,w,h,c){rr(g,x-w/2,y,w,h,w/3,c||"#8a5a33");}
function flower(g,pcol,ccol,stemH){line(g,32,58,32,58-stemH,"#4c7a3f",3);
  line(g,32,58-stemH*0.55,38,58-stemH*0.62,"#4c7a3f",2.4);
  petals(g,32,58-stemH,6,5.5,6,pcol);ci(g,32,58-stemH,4.2,ccol);}
/* a lumpy leafy silhouette (for lush tree canopies) */
function leafy(g,cx,cy,R){g.beginPath();const n=11;
  for(let i=0;i<=n;i++){const a=i/n*Math.PI*2,rr=R*(0.8+0.2*Math.sin(a*3+1.3));
    g.lineTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr*0.92);}g.closePath();}
/* generic side-view critter */
function beast(o){return sp(g=>{
  const c=o.c, y=o.y||38;
  if(o.tail==="bush")el(g,50,y-3,6.5,9,o.tc||c);
  if(o.tail==="curl"){g.beginPath();g.arc(50,y-10,8,0.4,4.6);g.strokeStyle=o.tc||c;g.lineWidth=6;g.stroke();
    g.beginPath();g.arc(50,y-10,8,0.4,4.6);g.strokeStyle=INK;g.lineWidth=1.6;g.stroke();}
  if(o.tail==="thin")line(g,48,y,56,y-8,INK,2);
  rr(g,24,y+5,5,13,2.4,c);rr(g,38,y+5,5,13,2.4,c);           // legs
  el(g,34,y,15,10.5,c);                                       // body
  if(o.spots)o.spots.forEach(s=>ci(g,s[0],y+s[1],2.2,s[2]||"#fff",false));
  if(o.mane)el(g,26,y-9,5,8,o.mane,false);
  ci(g,18,y-10,8.5,o.hc||c);                                  // head
  if(o.ear==="long"){el(g,14,y-25,3.2,8.5,o.hc||c);el(g,21,y-25,3.2,8.5,o.hc||c);}

/* the companions — storybook figures with shaped bodies, sleeves, hands,
   shoes and real faces. Per-character hair()/prop()/propBack() add the canon
   details (party hat, straw hat, shield, spool…). */
function person(o){return sp(g=>{
  const skin=o.skin,shirt=o.shirt,sleeve=o.sleeve||shirt,pants=o.pants||"#5c6a76",shoe=o.shoe||"#4a3b2c";
  if(o.propBack)o.propBack(g);
  /* legs & shoes */
  rr(g,27.3,42,4.8,14,2.3,pants);rr(g,31.9,42,4.8,14,2.3,pants);
  el(g,29.7,56.6,3.8,2.4,shoe);el(g,34.3,56.6,3.8,2.4,shoe);
  /* torso — a softly tapered shirt */
  g.beginPath();g.moveTo(25,43.5);g.quadraticCurveTo(22.6,33,26.6,27.8);
  g.quadraticCurveTo(32,25.8,37.4,27.8);g.quadraticCurveTo(41.4,33,39,43.5);
  g.quadraticCurveTo(32,45.6,25,43.5);g.closePath();pth(g,shirt);
  if(o.belt)rr(g,25.6,40.5,12.8,3,1,o.belt);
  line(g,29,28.5,32,31.5,INK,1.4);line(g,35,28.5,32,31.5,INK,1.4);   // collar
  /* arms + hands (pose: up / holding a prop / resting) */
  const pose=o.armsUp?"up":(o.prop?"prop":"down");
  if(pose==="up"){line(g,27.5,30,20.5,17,sleeve,4.8);ci(g,19.6,15.4,2.7,skin);
                  line(g,36.5,30,43.5,17,sleeve,4.8);ci(g,44.4,15.4,2.7,skin);}
  else{ line(g,27.5,30.5,22.4,41,sleeve,4.8);ci(g,21.8,42.4,2.7,skin);
    if(pose==="prop"){line(g,36.5,30.5,41.6,37,sleeve,4.8);ci(g,42.2,38,2.7,skin);}
    else{line(g,36.5,30.5,41.6,41,sleeve,4.8);ci(g,42.2,42.4,2.7,skin);} }
  /* neck & head */
  rr(g,30.4,23.5,3.2,4.5,1.4,skin);
  ci(g,24.2,19.2,1.8,skin);ci(g,39.8,19.2,1.8,skin);                 // ears

  if(o.hair)o.hair(g);
  if(!o.noFace){
    dot(g,29.3,19.2,1.5);dot(g,34.7,19.2,1.5);
    ci(g,28.9,18.7,0.55,"#fff",false);ci(g,34.3,18.7,0.55,"#fff",false); // eye glints

/* ================= tiny WebAudio layer (synthesised, zero audio files) ================= */
const SFX=(()=>{
  let ac=null,master=null,ambient=null,ambientWanted=false;
  let muted=store.get("tlbi_muted")==="1";
  function ctx(){
    if(muted)return null;
    if(!ac){try{const AC=window.AudioContext||window.webkitAudioContext;ac=new AC();
      master=ac.createGain();master.gain.value=0.5;master.connect(ac.destination);}catch(e){ac=null;}}
    if(ac&&ac.state==="suspended")ac.resume();
    return ac;
  }
  function tone(freq,dur,type,vol,slideTo,delay){
    const a=ctx();if(!a)return;
    const t0=a.currentTime+(delay||0),o=a.createOscillator(),g=a.createGain();
    o.type=type||"sine";o.frequency.setValueAtTime(freq,t0);
    if(slideTo)o.frequency.exponentialRampToValueAtTime(slideTo,t0+dur);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(vol||0.3,t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    o.connect(g);g.connect(master);o.start(t0);o.stop(t0+dur+0.03);
  }
  function seq(freqs,dur,type,vol,gap){freqs.forEach((f,i)=>tone(f,dur,type,vol,null,i*(gap||0.07)));}
  function setAmbient(on){
    ambientWanted=on;const a=ctx();if(!a){return;}
    if(ambient){try{ambient.src.stop();}catch(e){}ambient=null;}
    if(!on)return;
    const buf=a.createBuffer(1,a.sampleRate*2,a.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.5;                 // soft sea/breeze bed
    const src=a.createBufferSource();src.buffer=buf;src.loop=true;
    const lp=a.createBiquadFilter();lp.type="lowpass";lp.frequency.value=430;
    const g=a.createGain();g.gain.value=0.03;
    src.connect(lp);lp.connect(g);g.connect(master);src.start();
    ambient={src};
  }
  return {
    get muted(){return muted;},
    unlock(){const a=ctx();if(a&&ambientWanted&&!ambient)setAmbient(true);},
    ambient:setAmbient,
    toggleMute(){muted=!muted;store.set("tlbi_muted",muted?"1":"0");
      if(muted){if(ambient){try{ambient.src.stop();}catch(e){}ambient=null;}if(master)master.gain.value=0;}
      else{if(master)master.gain.value=0.5;ctx();if(ambientWanted)setAmbient(true);}

    chime(){tone(1047,0.45,"sine",0.11);}
  };

  cv.style.width=innerWidth+"px";cv.style.height=innerHeight+"px";
  /* internal render resolution — raised for a crisp, un-banded ground.
     Height drives detail; width follows the aspect ratio (capped for perf). */
  R3H=Math.round(Math.max(420,Math.min(500,innerHeight*0.62)));
  R3W=Math.max(320,Math.min(880,Math.round(R3H*innerWidth/innerHeight)));
  c3=mkc(R3W,R3H);g3=c3.getContext("2d");
  groundImg=null;                            // force ground buffer rebuild at new size
}

/* ================= world ================= */
function smoothPath(c2,pts){c2.beginPath();c2.moveTo(pts[0][0],pts[0][1]);
  for(let i=0;i<pts.length;i++){const a=pts[i],b=pts[(i+1)%pts.length];
  c2.quadraticCurveTo(a[0],a[1],(a[0]+b[0])/2,(a[1]+b[1])/2);}c2.closePath();}
function blobPts(rng,cx,cy,baseR,sx,sy){const pts=[],n=16;
  for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2;
  const r=baseR*(0.72+rng()*0.5)*(1+0.13*Math.sin(a*2+rng()*3));
  pts.push([cx+Math.cos(a)*r*sx,cy+Math.sin(a)*r*sy]);}return pts;}
const LOBES=[{x:665,y:275,r:200},{x:-680,y:-255,r:210},{x:150,y:-455,r:185}];
function buildWorld(){
  const cx=W/2,cy=H/2;
  const blobs=[{pts:blobPts(mulberry32(P.seed),cx,cy,430,1.45,0.92)}];
  for(let i=0;i<(P.expansions||0)&&i<LOBES.length;i++){
    const L=LOBES[i];
    blobs.push({pts:blobPts(mulberry32(P.seed+300+i*31),cx+L.x,cy+L.y,L.r,1.1,0.9)});
  }
  const sandM=mkc(W,H),sc=sandM.getContext("2d");
  const grassM=mkc(W,H),gc=grassM.getContext("2d");
  sc.fillStyle="#fff";gc.fillStyle="#fff";
  blobs.forEach((b,bi)=>{
    smoothPath(sc,b.pts);sc.fill();
    const c0=bi===0?[cx,cy]:[cx+LOBES[bi-1].x,cy+LOBES[bi-1].y];
    const gp=b.pts.map(p=>[c0[0]+(p[0]-c0[0])*0.82,c0[1]+(p[1]-c0[1])*0.8]);
    smoothPath(gc,gp);gc.fill();
  });
  landData=sc.getImageData(0,0,W,H).data;
  grassData=gc.getImageData(0,0,W,H).data;
  typeGrid=new Uint8Array(TW*TH);
  for(let ty=0;ty<TH;ty++)for(let tx=0;tx<TW;tx++){
    const x=tx*GRID+3,y=ty*GRID+3;
    typeGrid[ty*TW+tx]=grassAt(x,y)?2:(landAt(x,y)?1:0);
  }
  /* anti-aliased coverage maps: each cell = fraction of its SSxSS block that is
     land / grass. Sampled bilinearly at render time → smooth shores, no stairs. */
  SSW=Math.ceil(W/SS);SSH=Math.ceil(H/SS);
  softLand=new Float32Array(SSW*SSH);softGrass=new Float32Array(SSW*SSH);
  for(let sy=0;sy<SSH;sy++)for(let sx=0;sx<SSW;sx++){
    let land=0,grass=0,n=0;
    for(let dy=0;dy<SS;dy+=2)for(let dx=0;dx<SS;dx+=2){
      const x=sx*SS+dx,y=sy*SS+dy;if(x>=W||y>=H)continue;n++;
      const a=(y*W+x)*4+3;
      if(landData[a]>10)land++;if(grassData[a]>10)grass++;
    }
    softLand[sy*SSW+sx]=n?land/n:0;softGrass[sy*SSW+sx]=n?grass/n:0;
  }
  /* pretty island (transparent sea) for bird view & minimap */
  islandCanvas=mkc(W,H);const ic=islandCanvas.getContext("2d");
  blobs.forEach(b=>{ic.save();ic.strokeStyle="rgba(255,255,255,.16)";ic.lineWidth=26;
    smoothPath(ic,b.pts);ic.stroke();ic.restore();});
  blobs.forEach(b=>{ic.fillStyle="#e9d8a6";smoothPath(ic,b.pts);ic.fill();
    ic.strokeStyle="#d4b878";ic.lineWidth=6;smoothPath(ic,b.pts);ic.stroke();});
  blobs.forEach((b,bi)=>{const c0=bi===0?[cx,cy]:[cx+LOBES[bi-1].x,cy+LOBES[bi-1].y];
    const gp=b.pts.map(p=>[c0[0]+(p[0]-c0[0])*0.82,c0[1]+(p[1]-c0[1])*0.8]);
    ic.fillStyle="#8fbf7f";smoothPath(ic,gp);ic.fill();});
  const srng=mulberry32(P.seed+7);
  ic.fillStyle="rgba(70,130,80,.3)";
  for(let i=0;i<600;i++){const x=srng()*W,y=srng()*H;if(grassAt(x,y))ic.fillRect(x,y,3,3);}
  /* fog */
  fogCanvas=mkc(W,H);fogCtx=fogCanvas.getContext("2d");
  fogCtx.fillStyle="rgba(216,229,226,0.97)";fogCtx.fillRect(0,0,W,H);
  fogCtx.fillStyle="rgba(255,255,255,0.45)";
  for(let i=0;i<300;i++){fogCtx.beginPath();fogCtx.arc(srng()*W,srng()*H,20+srng()*50,0,7);fogCtx.fill();}
  lastRevealX=-1e9;
  (P.revealed||[]).forEach(p=>punchFog(p[0],p[1],p[2]||130));
  /* discoveries */
  const drng=mulberry32(P.seed+55);discoveries=[];const taken=[];
  for(let i=0;i<DISCOVERIES.length;i++){
    let x=cx,y=cy,ok=false,tries=0;
    while(!ok&&tries<400){tries++;
      x=cx+(drng()*2-1)*560;y=cy+(drng()*2-1)*420;
      ok=landAt(x,y)&&Math.hypot(x-cx,y-cy)>170&&taken.every(t=>Math.hypot(t[0]-x,t[1]-y)>160);}
    taken.push([x,y]);
    discoveries.push({i,x,y,found:(P.found||[]).includes(i)});
  }
  /* the stuck cat */
  const crng=mulberry32(P.seed+404);catTree=null;petCat=null;
  if(P.deeds.cat==="done"){
    petCat={x:cx+40,y:cy+30,tx:cx+40,ty:cy+30,wait:1};
  } else {
    let x=cx,y=cy;
    for(let t=0;t<300;t++){const tx=cx+(crng()*2-1)*480,ty=cy+(crng()*2-1)*380;
      if(landAt(tx,ty)&&Math.hypot(tx-cx,ty-cy)>220){x=tx;y=ty;break;}}
    catTree={x,y};
  }
  /* companions */
  const nrng=mulberry32(P.seed+99);
  npcs=NPCS.map(n=>{let x=cx,y=cy;
    for(let t=0;t<200;t++){const tx=cx+(nrng()*2-1)*420,ty=cy+(nrng()*2-1)*330;
      if(landAt(tx,ty)){x=tx;y=ty;break;}}
    return{def:n,x,y,tx:x,ty:y,wait:nrng()*3,said:0};});
  player.x=cx;player.y=cy;
  if(!P.revealed||!P.revealed.length)revealAt(cx,cy,220);
  genMirror();
  miniDirty=true;
}
/* the island renders who you are: each treasure's region blooms with its level */
function genMirror(){
  mirrorDecor=[];
  const cx=W/2,cy=H/2;
  TORDER.forEach((t,ti)=>{
    const lv=tlevel((P.mir&&P.mir[t]||{w:0}).w);
    if(!lv)return;
    const rng=mulberry32(P.seed+900+ti*13);
    const secA=ti/7*Math.PI*2+((P.seed%7)/7);
    const deco=MIR[t].deco;
    const n=lv*3;
    for(let k=0;k<n;k++){
      let x,y,ok=false;
      for(let tr=0;tr<60&&!ok;tr++){
        const a=secA+(rng()*2-1)*0.42, rr2=130+rng()*380;
        x=cx+Math.cos(a)*rr2*1.35;y=cy+Math.sin(a)*rr2*0.9;
        ok=landAt(x,y);
      }
      if(ok)mirrorDecor.push({x,y,k:deco[k%deco.length],s:k%deco.length===deco.length-1&&deco[deco.length-1]==="mountain"?70:20+((k*7)%14),t});
    }
  });
}
function landAt(x,y){x|=0;y|=0;if(x<0||y<0||x>=W||y>=H)return false;
  return landData[(y*W+x)*4+3]>10;}
function grassAt(x,y){x|=0;y|=0;if(x<0||y<0||x>=W||y>=H)return false;
  return grassData[(y*W+x)*4+3]>10;}
function typeAt(x,y){const tx=(x/GRID)|0,ty=(y/GRID)|0;
  if(tx<0||ty<0||tx>=TW||ty>=TH)return 0;return typeGrid[ty*TW+tx];}
function punchFog(x,y,r){const g=fogCtx.createRadialGradient(x,y,r*0.35,x,y,r);
  g.addColorStop(0,"rgba(0,0,0,1)");g.addColorStop(1,"rgba(0,0,0,0)");
  fogCtx.save();fogCtx.globalCompositeOperation="destination-out";
  fogCtx.fillStyle=g;fogCtx.beginPath();fogCtx.arc(x,y,r,0,7);fogCtx.fill();fogCtx.restore();}
function revealAt(x,y,r){punchFog(x,y,r);P.revealed=P.revealed||[];
  if(P.revealed.length<5000){P.revealed.push([Math.round(x),Math.round(y),r]);save();}miniDirty=true;}

    '<div class="qtreasure">'+spimg(T.k,20)+' '+T.name+' · with '+T.who+'</div>'+

    const spk=(who&&who.ch>P.chapter)?"The island":TRE[tr].who;
    bubble(spk,lines[Math.floor(Math.random()*lines.length)],6000);
    if(wit){
      const before=mirrorDecor.filter(d=>d.t===tr).length;
      genMirror();miniDirty=true;
      const mine=mirrorDecor.filter(d=>d.t===tr);
      if(mine.length>before){const nw=mine[mine.length-1];revealAt(nw.x,nw.y,130);}
      const lv=tlevel(P.mir[tr].w);
      toast("+12 coins · "+MIR[tr].region+" grew — "+TRE[tr].name+" is now "+MIR[tr].stages[lv]);
      if((P.found||[]).includes(4))setTimeout(()=>toast("The Mirror Lake has something new to show you."),2800);
    } else {

    }
    const nc=chapterOf(P.doneCount);
    if(nc>P.chapter)chapterUp(nc);
  };
  $("q_wit").onclick=()=>finish(true);
  $("q_solo").onclick=()=>finish(false);
}

    const task=isBubble?BUBBLE_TASKS[Math.min(P.bubblePops,1)].task:d.task;
    const btn=isBubble?BUBBLE_TASKS[Math.min(P.bubblePops,1)].btn:d.btn;
    html+='<div class="deed'+(done?" done":locked?" locked":"")+'">'+spimg(d.spr,44)+'<div>'+
      '<div class="dt">'+d.title+(done?" — DONE":"")+(isBubble&&P.bubblePops?' (popped ×'+P.bubblePops+')':'')+'</div>';
    if(locked){html+='<div class="st">Locked — reaches you at Chapter '+d.ch+'</div>';}
    else if(done){
      let st=d.reward.type==="expand"?"Your island grew!":d.reward.type==="cat"?"The cat follows you around now.":"Placed from Build → Trophies, whenever you like.";
      if(isBubble)st="It's REAL transportation — walk up to it and ride it. It even floats over the sea. Careful: bubble wear "+Math.round(P.bubbleWear/BUBBLE_CAP*100)+"%. Bubbles pop.";
      html+='<div class="st">'+st+'</div>';
    }
    else{
      html+='<div class="dd">'+esc(task)+'</div><div class="st">'+esc(d.voice)+'</div>';

      html+='<button class="sm" data-deed="'+d.id+'">'+esc(btn)+'</button>';
    }
    html+='</div></div>';
  });

  showModal(html);

      'Cats. It follows you around your island now, at a dignified distance.</p>'+

function placeAt(wx,wy){
  if(scene==="room"){
    const room=roomRect();
    if(wx<room.x+20||wx>room.x+room.w-20||wy<room.y+60||wy>room.y+room.h-14)return;
    const items=P.interiors[roomOf]=P.interiors[roomOf]||[];
    for(let i=items.length-1;i>=0;i--){const f=items[i],fd=FURN[f.f];
      if(Math.hypot(f.x-wx,f.y-wy)<fd.s*0.55){items.splice(i,1);save();toast("Picked up the "+fd.n.toLowerCase());return;}}
    if(selItem===null||!selIsFurn)return;
    items.push({f:selItem,x:Math.round(wx),y:Math.round(wy)});save();return;
  }
  const pr=18/birdScale()*0.06+22; // generous pickup radius in world units
  for(let i=P.placed.length-1;i>=0;i--){
    const p=P.placed[i],it=ITEMS[p.i];
    if(Math.hypot(p.x-wx,p.y-wy)<Math.max(pr,it.s*0.45)){
      if(it.enter&&P.interiors[p.id]&&P.interiors[p.id].length){toast("That home has furniture inside! Empty it first.");return;}
      P.placed.splice(i,1);P.coins+=it.c;save();coinsUI();SFX.pickup();
      toast("Picked up the "+it.n.toLowerCase()+(it.c?" · +"+it.c+" coins back":""));
      renderDrawer();miniDirty=true;return;
    }
  }
  if(selItem===null||selIsFurn)return;
  const it=ITEMS[selItem];
  if(it.cat==="trophy"&&(P.placed.some(p=>p.i===selItem)||(selItem===BUBBLE_I&&P.bubbleHeld))){
    toast("You already have that one out — trophies are one of a kind.");return;}
  const onLand=landAt(wx,wy);
  if(!it.any){
    if(it.water&&onLand){toast("The "+it.n.toLowerCase()+" wants to float — tap the water.");return;}
    if(!it.water&&!onLand){toast("The "+it.n.toLowerCase()+" would sink! Tap the land.");return;}
  }
  if(it.c>P.coins){toast("Not enough coins — do a quest!");renderDrawer();return;}
  P.coins-=it.c;
  P.placed.push({i:selItem,x:Math.round(wx),y:Math.round(wy),id:"h"+Date.now().toString(36)+Math.floor(Math.random()*99)});
  save();coinsUI();renderDrawer();revealAt(wx,wy,90);SFX.place();
  if(it.k==="rainbow")bubble("Bright","Hey. HEY. This is not a rainbow story. …Fine. It can stay. But if a unicorn slips, that's on you.");
  else if(it.k==="poop")bubble("Bright","Ah. Authentic dragon poop. Watch your step. Smells like burnt marshmallows and regret.");
  else if(it.k==="turtle")bubble("Kazoo","Why did the turtle cross the road?! We don't know — it's STILL CROSSING!");
  else if(it.k==="waterfall")bubble("Kazoo","TEN laughs. The cliff heard every one of them. Listen to it POUR!");
  else if(it.k==="bubblecar")bubble("Kazoo","That's not decoration, that's TRANSPORTATION. Walk up to it and ride it! It floats over the SEA!");
  else if(it.enter)bubble("Patch","A home! Walk up to the door and you can go inside and decorate it.");
}

addEventListener("keydown",e=>{keys[e.key.toLowerCase()]=true;
  if(e.key==="Enter"&&$("actionbtn").style.display==="block")$("actionbtn").click();

addEventListener("keyup",e=>{keys[e.key.toLowerCase()]=false;});
const joy=$("joy"),knob=$("knob");let joyId=null;
joy.addEventListener("pointerdown",e=>{joyId=e.pointerId;joy.setPointerCapture(joyId);joyMove(e);});
joy.addEventListener("pointermove",e=>{if(e.pointerId===joyId)joyMove(e);});
function joyEnd(e){if(e.pointerId===joyId){joyId=null;joyVec={x:0,y:0};knob.style.transform="translate(-50%,-50%)";}}
joy.addEventListener("pointerup",joyEnd);joy.addEventListener("pointercancel",joyEnd);
function joyMove(e){const r=joy.getBoundingClientRect();
  let dx=e.clientX-(r.left+r.width/2),dy=e.clientY-(r.top+r.height/2);
  const m=Math.hypot(dx,dy),max=r.width/2-10;
  if(m>max){dx=dx/m*max;dy=dy/m*max;}
  joyVec={x:dx/max,y:dy/max};
  knob.style.transform="translate(calc(-50% + "+dx+"px), calc(-50% + "+dy+"px))";}
cv.addEventListener("pointerdown",e=>{
  if(performance.now()<placeCooldown)return;placeCooldown=performance.now()+180;
  if(scene==="build"){
    const s=birdScale(),ox=(innerWidth-W*s)/2,oy=(innerHeight-H*s)/2;
    placeAt((e.clientX-ox)/s,(e.clientY-oy)/s);miniDirty=true;
  } else if(scene==="room"){
    placeAt(e.clientX+camX,e.clientY+camY);
  }
});

/* ================= update ================= */
let last=performance.now();
function tick(now){requestAnimationFrame(tick);
  const dt=Math.min(0.05,(now-last)/1000);last=now;
  if(scene==="start"){drawSea(now);return;}
  update(dt,now);
  if(scene==="fp")renderFP(now);
  else if(scene==="build")renderBird(now);
  else if(scene==="room")renderRoom(now);
  if(scene==="fp")renderMini();
}
function update(dt,now){
  let fwd=0,turn=0,mx=0,my=0;
  if(keys.arrowup||keys.w)fwd+=1;
  if(keys.arrowdown||keys.s)fwd-=1;
  if(keys.arrowleft||keys.a)turn-=1;
  if(keys.arrowright||keys.d)turn+=1;
  fwd+=-joyVec.y;turn+=joyVec.x;
  fwd=Math.max(-1,Math.min(1,fwd));turn=Math.max(-1,Math.min(1,turn));
  if(scene==="fp"){
    player.ang+=turn*2.4*dt;
    const sp=riding?265:(fwd>0?205:150);
    let nx=player.x+Math.cos(player.ang)*fwd*sp*dt;
    let ny=player.y+Math.sin(player.ang)*fwd*sp*dt;
    if(riding){ /* bubbles float over ANYTHING — including the sea */
      nx=Math.max(30,Math.min(W-30,nx));ny=Math.max(30,Math.min(H-30,ny));
    } else {
      if(!landAt(nx,player.y))nx=player.x;
      if(!landAt(player.x,ny))ny=player.y;
      if(!landAt(nx,ny)){nx=player.x;ny=player.y;}
    }
    const moved=Math.hypot(nx-player.x,ny-player.y);
    player.x=nx;player.y=ny;player.moving=moved>0.1;
    player.bob=player.moving?player.bob+dt*(riding?4:9):player.bob*0.9;
    if(player.moving&&!riding){const sp=Math.floor(player.bob*1.15/Math.PI);
      if(sp!==player._sp){player._sp=sp;SFX.step();}}
    if(riding&&moved>0.1){
      P.bubbleWear+=moved;
      if(!rideWarned&&P.bubbleWear>BUBBLE_CAP*0.75){rideWarned=true;save();
        bubble("Kazoo","Um. Your bubble is making a squeaky noise. Bubbles do that near the end. Just saying!");}
      if(P.bubbleWear>=BUBBLE_CAP)popBubble();
    }
    if(Math.hypot(player.x-lastRevealX,player.y-lastRevealY)>46){
      lastRevealX=player.x;lastRevealY=player.y;revealAt(player.x,player.y,150);}
    /* discoveries */
    for(const d of discoveries){
      if(!d.found&&Math.hypot(d.x-player.x,d.y-player.y)<46){
        d.found=true;P.found=P.found||[];P.found.push(d.i);
        const D=DISCOVERIES[d.i];P.coins+=D.coins;save();coinsUI();confetti();SFX.discover();miniDirty=true;
        showModal('<div class="kicker">you found something in the fog</div>'+
          '<div style="text-align:center;margin:6px 0">'+spimg(D.k,80)+'</div>'+
          '<h1>'+esc(D.t)+'</h1><p class="sub" style="font-size:16px">'+esc(D.d)+'</p>'+
          '<div class="qvoice">+'+D.coins+' coins · '+(P.found.length)+' of '+DISCOVERIES.length+
          ' island secrets found. The part of you that you never saw? You just saw a bit of it.</div>'+
          '<div class="btnrow"><button class="big warm" onclick="hideModal()">Keep exploring</button></div>');
      }
    }
    /* companions wander */
    for(const n of npcs){
      if(n.def.ch>P.chapter)continue;
      n.wait-=dt;
      if(n.wait<=0){n.wait=2+Math.random()*4;
        const tx=n.x+(Math.random()*2-1)*140,ty=n.y+(Math.random()*2-1)*110;
        if(landAt(tx,ty)){n.tx=tx;n.ty=ty;}}
      const dx=n.tx-n.x,dy=n.ty-n.y,dm=Math.hypot(dx,dy);
      n.moving=dm>2;
      if(n.moving){n.x+=dx/dm*34*dt;n.y+=dy/dm*34*dt;}
      if(Math.hypot(n.x-player.x,n.y-player.y)<80&&now-n.said>14000){
        n.said=now;bubble(n.def.name,n.def.lines[Math.floor(Math.random()*n.def.lines.length)]);}
    }
    /* pet cat follows */
    if(petCat){
      const d=Math.hypot(player.x-petCat.x,player.y-petCat.y);
      if(d>120){petCat.tx=player.x-Math.cos(player.ang)*60;petCat.ty=player.y-Math.sin(player.ang)*60;}
      const dx=petCat.tx-petCat.x,dy=petCat.ty-petCat.y,dm=Math.hypot(dx,dy);
      if(dm>4){petCat.x+=dx/dm*Math.min(170,dm*2.4)*dt;petCat.y+=dy/dm*Math.min(170,dm*2.4)*dt;}
    }
    /* cat in tree — the cat arrives WITH Shaky (chapter 7). scared things find each other. */
    if(catTree&&P.chapter>=7&&Math.hypot(catTree.x-player.x,catTree.y-player.y)<180&&now-(catTree.said||0)>12000){
      catTree.said=now;bubble("A cat, in a tree","MEOW. Meow meow. (Translation: this is fine. This is NOT fine. Open Big Deeds.)");
    }
    /* action button */
    let act=null;
    if(riding){
      act=landAt(player.x,player.y)
        ?{t:"Hop out of the bubble",f:hopOut}
        :{t:"(find land to hop out)",f:()=>{}};
    }
    if(!act)for(const p of P.placed){const it=ITEMS[p.i];
      if(it.enter&&Math.hypot(p.x-player.x,p.y-player.y)<it.s*0.9+30){act={t:"Go inside the "+it.n.toLowerCase(),f:()=>enterRoom(p.id)};break;}}
    if(!act)for(const p of P.placed){
      if(p.i===BUBBLE_I&&Math.hypot(p.x-player.x,p.y-player.y)<85){act={t:"Ride the bubble",f:()=>rideBubble(p.id)};break;}}
    if(!act){const ml=discoveries[4];
      if(ml&&ml.found&&Math.hypot(ml.x-player.x,ml.y-player.y)<95)
        act={t:"Look into the Mirror Lake",f:openMirror};}
    if(!act&&catTree&&P.chapter>=7&&Math.hypot(catTree.x-player.x,catTree.y-player.y)<120)
      act={t:"Help the cat (Big Deeds)",f:openDeeds};
    const ab=$("actionbtn");
    if(act){ab.style.display="block";ab.textContent=act.t;ab.onclick=act.f;}
    else ab.style.display="none";
  } else if(scene==="room"){
    const sp=230;
    let nx=player.x+ (((keys.arrowright||keys.d)?1:0)-((keys.arrowleft||keys.a)?1:0)+joyVec.x)*sp*dt;

  const vg=ctx.createRadialGradient(W2/2,H2*0.5,Math.min(W2,H2)*0.42,
    W2/2,H2*0.5,Math.max(W2,H2)*0.85);
  vg.addColorStop(0,"rgba(0,0,0,0)");vg.addColorStop(0.75,"rgba(26,54,44,.08)");vg.addColorStop(1,"rgba(20,44,38,.26)");
  ctx.fillStyle=vg;ctx.fillRect(0,0,W2,H2);
  if(riding)ctx.fillStyle="rgba(190,230,240,.10)",ctx.fillRect(0,0,W2,H2);
  drawForeGrass(now);
  drawHands(now);
  if(riding)drawBubbleOverlay(now);
}
function drawBubbleOverlay(now){
  const w=innerWidth,h=innerHeight,cx2=w/2,cy2=h*0.58;
  const wear=P.bubbleWear/BUBBLE_CAP;
  const wob=Math.sin(now*0.004)*(4+wear*10);
  const R=Math.min(w,h)*0.62+wob;
  ctx.save();
  ctx.beginPath();ctx.arc(cx2,cy2,R,0,7);
  ctx.strokeStyle="rgba(255,255,255,.75)";ctx.lineWidth=7;ctx.stroke();
  ctx.beginPath();ctx.arc(cx2,cy2,R-8,0,7);
  ctx.strokeStyle="rgba(160,215,235,.5)";ctx.lineWidth=4;ctx.stroke();
  ctx.beginPath();ctx.ellipse(cx2-R*0.45,cy2-R*0.5,R*0.16,R*0.07,-0.6,0,7);
  ctx.fillStyle="rgba(255,255,255,.65)";ctx.fill();
  if(wear>0.75){ /* it's near the end — it shows */
    ctx.beginPath();ctx.arc(cx2,cy2,R,1.1+Math.sin(now*0.01)*0.2,1.6+Math.sin(now*0.01)*0.2);
    ctx.strokeStyle="rgba(255,120,120,.7)";ctx.lineWidth=8;ctx.stroke();
  }
  ctx.restore();
}
/* lush foreground grass framing the bottom of the view — layered blades that sway,
   with the odd wildflower poking up. Reads as standing in tall grass (depth + life). */
function drawForeGrass(now){
  const w=innerWidth,h=innerHeight,t=now*0.0012;
  const hsh=x=>{let n=(x*374761)|0;n=(n^(n>>13))*1274126177;return ((n>>>0)&255)/255;};
  const layers=[
    {base:h+6, hgt:h*0.11, col:"#3c7a46", step:24, bw:8,  sway:5},
    {base:h+10,hgt:h*0.155,col:"#579c50", step:29, bw:10, sway:8},
    {base:h+14,hgt:h*0.215,col:"#77c25a", step:35, bw:12, sway:12}
  ];
  ctx.save();ctx.lineJoin="round";
  for(const L of layers){
    for(let x=-30;x<w+30;x+=L.step){
      const r1=hsh(x*2.3+L.step),r2=hsh(x*5.1+L.step*3);
      const px=x+r1*L.step*0.6;
      const sway=Math.sin(t*3.4+x*0.05)*L.sway;
      const bh=L.hgt*(0.62+r2*0.7);
      for(const o of[-L.bw*0.7,0,L.bw*0.7]){
        const bx=px+o,tipx=bx+sway+o*0.5;
        ctx.beginPath();
        ctx.moveTo(bx-L.bw*0.5,L.base);
        ctx.quadraticCurveTo(bx-L.bw*0.25,L.base-bh*0.6,tipx,L.base-bh);
        ctx.quadraticCurveTo(bx+L.bw*0.28,L.base-bh*0.6,bx+L.bw*0.5,L.base);
        ctx.closePath();ctx.fillStyle=L.col;ctx.fill();
      }
      if(L.sway>10&&r1>0.86){ /* a wildflower on a stalk */
        const fx=px+sway*0.8,fy=L.base-bh*0.96;
        const fc=r2>0.6?"#a482d6":r2>0.3?"#f6de56":"#f0a0c4";
        ctx.strokeStyle="#4f8c3f";ctx.lineWidth=2.4;
        ctx.beginPath();ctx.moveTo(px,L.base-bh*0.4);ctx.lineTo(fx,fy);ctx.stroke();
        ctx.fillStyle=fc;ctx.beginPath();ctx.arc(fx,fy,4.6,0,7);ctx.fill();
        ctx.fillStyle="#fff3c8";ctx.beginPath();ctx.arc(fx,fy,1.7,0,7);ctx.fill();
      }
    }
  }
  ctx.restore();
}
/* your own two hands — back-of-hand with four fingers and a thumb.
   They swing in alternation while you walk and gently breathe while you stand. */
function drawHands(now){
  const w=innerWidth,h=innerHeight,t=now*0.001;
  const moving=player.moving;
  /* drop-in painted hands: assets/hands.png (both hands, transparent bg) overrides the
     drawn hands and is bobbed/swung by the engine. Falls back to the drawn hands. */
  const himg=SPR.hands;
  if(himg&&himg.width&&!himg.toDataURL){
    const iw=himg.naturalWidth||himg.width,ih=himg.naturalHeight||himg.height;
    const dh=h*0.52,dw=dh*iw/ih;
    const bob=moving?Math.abs(Math.sin(player.bob*1.15))*16:Math.sin(t*1.7)*5;
    const sway=moving?Math.sin(player.bob*1.15)*7:Math.sin(t*0.8)*3;
    ctx.drawImage(himg,(w-dw)/2+sway,h-dh*0.9-bob,dw,dh);
    return;
  }
  const breathe=Math.sin(t*1.7);
  const u=Math.min(w,h)*0.17;                       // hand scale unit
  ctx.save();ctx.lineJoin="round";ctx.lineCap="round";
  for(const side of[-1,1]){
    const ph=side<0?0:Math.PI;
    const swing=Math.sin(player.bob*1.15+ph);        // opposite phase per hand
    const lift=moving?Math.max(0,swing)*13:0;
    const drift=moving?swing*7:Math.sin(t*0.8+ph)*3;
    const hx=w/2+side*w*0.325+side*drift;
    const hy=h-u*0.24-lift-(moving?0:breathe*3);
    // finger curl: relaxed-open while walking, slow soft clench while idle
    const curl=moving?0.20+0.10*Math.max(0,swing):0.34+0.06*Math.sin(t*1.7+ph+1);
    ctx.save();
    ctx.translate(hx,hy);
    ctx.scale(side,1);                               // mirror the right hand
    ctx.rotate(-0.14);
    drawOneHand(u,curl);
    ctx.restore();
  }
  ctx.restore();
}
function drawOneHand(u,curl){
  const skin=P.hand,ink="#31404b",lw=Math.max(2,u*0.05);
  ctx.fillStyle=skin;ctx.strokeStyle=ink;ctx.lineWidth=lw;
  // forearm / cuff sinking off the bottom edge
  ctx.beginPath();ctx.roundRect(-u*0.40,u*0.52,u*0.80,u*0.85,u*0.22);ctx.fill();ctx.stroke();
  // back of the hand
  ctx.beginPath();ctx.roundRect(-u*0.46,-u*0.34,u*0.92,u*1.02,u*0.30);ctx.fill();ctx.stroke();
  // four fingers (index → pinky): [baseX, length, splay]
  const fw=u*0.235;
  const F=[[-0.31,1.02,-0.16],[-0.10,1.16,-0.05],[0.11,1.10,0.05],[0.31,0.90,0.17]];
  for(const[bx,len,ang]of F){
    ctx.save();
    ctx.translate(bx*u,-u*0.30);
    ctx.rotate(ang+curl*bx*1.4);                     // splay out + curl in
    const L=len*u*(1-curl*0.30);
    ctx.beginPath();ctx.roundRect(-fw/2,-L,fw,L+u*0.16,fw*0.5);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(-fw*0.36,-L*0.52);ctx.lineTo(fw*0.36,-L*0.52); // knuckle crease
    ctx.lineWidth=Math.max(1,u*0.022);ctx.strokeStyle="rgba(49,64,75,.5)";ctx.stroke();
    ctx.lineWidth=lw;ctx.strokeStyle=ink;
    ctx.restore();
  }
  // thumb, tucked to the inner edge
  ctx.save();
  ctx.translate(-u*0.42,u*0.06);
  ctx.rotate(-0.95-curl*0.35);
  ctx.beginPath();ctx.roundRect(-fw*0.55,-u*0.66,fw*1.1,u*0.80,fw*0.55);ctx.fill();ctx.stroke();
  ctx.restore();
}
function renderBird(now){
  drawSea(now);
  const s=birdScale(),ox=(innerWidth-W*s)/2,oy=(innerHeight-H*s)/2;
  ctx.setTransform(DPR*s,0,0,DPR*s,ox*DPR,oy*DPR);
  /* breathing wave rings around the island */
  for(let i=0;i<3;i++){
    const ph=((now*0.00018)+i/3)%1;
    ctx.strokeStyle="rgba(255,255,255,"+(0.22*(1-ph))+")";
    ctx.lineWidth=(3+ph*5)/s*s;
    ctx.save();ctx.translate(W/2,H/2);ctx.scale(1.28+ph*0.16,0.92*(1.28+ph*0.16));
    ctx.beginPath();ctx.arc(0,0,470,0,7);ctx.stroke();ctx.restore();
  }
  ctx.drawImage(islandCanvas,0,0);
  const objs=worldObjects().map(o=>({...o}));
  objs.sort((a,b)=>a.y-b.y);
  for(const o of objs){
    const spr=SPR[o.k];if(!spr)continue;
    const sz=Math.max(o.s,14/s);   // keep tappable on small screens
    const w2=sz*spr.width/spr.height;
    ctx.fillStyle="rgba(30,60,60,.16)";
    ctx.beginPath();ctx.ellipse(o.x,o.y+2,sz*0.3,sz*0.12,0,0,7);ctx.fill();
    ctx.drawImage(spr,o.x-w2/2,o.y-sz*0.94,w2,sz);
  }
  /* you */
  ctx.beginPath();ctx.arc(player.x,player.y,10/s,0,7);
  ctx.fillStyle=P.hand;ctx.fill();ctx.strokeStyle="#31404b";ctx.lineWidth=2/s;ctx.stroke();
  ctx.beginPath();ctx.moveTo(player.x+Math.cos(player.ang)*17/s,player.y+Math.sin(player.ang)*17/s);
  ctx.lineTo(player.x+Math.cos(player.ang+2.5)*9/s,player.y+Math.sin(player.ang+2.5)*9/s);
  ctx.lineTo(player.x+Math.cos(player.ang-2.5)*9/s,player.y+Math.sin(player.ang-2.5)*9/s);
  ctx.closePath();ctx.fillStyle=P.hand;ctx.fill();ctx.stroke();
  ctx.drawImage(fogCanvas,0,0);
}
function renderRoom(now){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.fillStyle="#173f4a";ctx.fillRect(0,0,innerWidth,innerHeight);
  ctx.setTransform(DPR,0,0,DPR,-camX*DPR,-camY*DPR);
  const r=roomRect();
  ctx.fillStyle="#c9a06b";ctx.fillRect(r.x-16,r.y-16,r.w+32,r.h+32);
  ctx.fillStyle="#8a6b45";ctx.fillRect(r.x-16,r.y-16,r.w+32,70);
  ctx.fillStyle="#f3e7c9";ctx.fillRect(r.x,r.y+54,r.w,r.h-54);
  ctx.fillStyle="rgba(224,122,63,.14)";
  ctx.beginPath();ctx.ellipse(r.x+r.w/2,r.y+r.h*0.62,150,70,0,0,7);ctx.fill();
  ctx.strokeStyle="rgba(224,122,63,.3)";ctx.lineWidth=3;
  ctx.beginPath();ctx.ellipse(r.x+r.w/2,r.y+r.h*0.62,150,70,0,0,7);ctx.stroke();
  ctx.drawImage(SPR.f_window,r.x+r.w*0.25-19,r.y+6,38,38);
  ctx.drawImage(SPR.f_window,r.x+r.w*0.75-19,r.y+6,38,38);
  ctx.font="15px Georgia";ctx.fillStyle="#fffbe9";ctx.textAlign="center";
  ctx.fillText(P.name+"'s place",r.x+r.w/2,r.y+24);
  const items=(P.interiors[roomOf]||[]).map(f=>({f,y:f.y}));
  items.sort((a,b)=>a.y-b.y);
  for(const o of items){const fd=FURN[o.f.f],spr=SPR[fd.k];
    const w2=fd.s*spr.width/spr.height;
    ctx.fillStyle="rgba(30,60,60,.14)";
    ctx.beginPath();ctx.ellipse(o.f.x,o.f.y+2,fd.s*0.3,fd.s*0.12,0,0,7);ctx.fill();
    ctx.drawImage(spr,o.f.x-w2/2,o.f.y-fd.s*0.94,w2,fd.s);}
  ctx.beginPath();ctx.arc(player.x,player.y,13,0,7);
  ctx.fillStyle=P.hand;ctx.fill();ctx.strokeStyle="#31404b";ctx.lineWidth=3;ctx.stroke();
}
/* minimap */
const mini=$("mini"),mctx=mini.getContext("2d");
let miniTimer=0;
function renderMini(){
  const now=performance.now();
  if(now-miniTimer<250&&!miniDirty)return;
  miniTimer=now;miniDirty=false;
  const s=Math.min(300/W,220/H);
  mctx.setTransform(1,0,0,1,0,0);
  mctx.fillStyle="#2e7d8f";mctx.fillRect(0,0,300,220);
  mctx.setTransform(s,0,0,s,(300-W*s)/2,(220-H*s)/2);
  mctx.drawImage(islandCanvas,0,0);
  mctx.drawImage(fogCanvas,0,0);
  mctx.fillStyle=P.hand;mctx.beginPath();mctx.arc(player.x,player.y,26/s*s+26,0,7);
  mctx.setTransform(1,0,0,1,0,0);
  const px=(300-W*s)/2+player.x*s,py=(220-H*s)/2+player.y*s;
  mctx.beginPath();mctx.arc(px,py,5,0,7);mctx.fillStyle=P.hand;mctx.fill();
  mctx.strokeStyle="#31404b";mctx.lineWidth=1.5;mctx.stroke();
  mctx.beginPath();mctx.moveTo(px+Math.cos(player.ang)*10,py+Math.sin(player.ang)*10);
  mctx.lineTo(px+Math.cos(player.ang+2.4)*5,py+Math.sin(player.ang+2.4)*5);
  mctx.lineTo(px+Math.cos(player.ang-2.4)*5,py+Math.sin(player.ang-2.4)*5);
  mctx.closePath();mctx.fillStyle="#fffbe9";mctx.fill();
}

/* ================= confetti ================= */
const cf=$("confetti"),cfx=cf.getContext("2d");let parts=[];
function confetti(){
  cf.width=innerWidth;cf.height=innerHeight;
  const colors=["#e07a3f","#c9a227","#4c9a6a","#2e7d8f","#d95f8a","#7b6fd0"];
  for(let i=0;i<90;i++)parts.push({x:innerWidth/2+(Math.random()*2-1)*120,y:innerHeight*0.35,
    vx:(Math.random()*2-1)*380,vy:-Math.random()*420-80,
    c:colors[i%colors.length],r:4+Math.random()*5,a:1,spin:Math.random()*7});
  if(!confetti._on){confetti._on=true;cfTick(performance.now());}
}
function cfTick(t0){requestAnimationFrame(t=>{
  const dt=Math.min(0.04,(t-t0)/1000);
  cfx.clearRect(0,0,cf.width,cf.height);
  parts.forEach(p=>{p.vy+=900*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.a-=dt*0.55;p.spin+=dt*6;});
  parts=parts.filter(p=>p.a>0&&p.y<cf.height+20);
  for(const p of parts){cfx.save();cfx.globalAlpha=Math.max(0,p.a);cfx.translate(p.x,p.y);
    cfx.rotate(p.spin);cfx.fillStyle=p.c;cfx.fillRect(-p.r,-p.r/2,p.r*2,p.r);cfx.restore();}
  if(parts.length)cfTick(t);
  else{confetti._on=false;cfx.clearRect(0,0,cf.width,cf.height);}
});}

/* ================= go ================= */
window.hideModal=hideModal;
/* drop-in art: any assets/<key>.png overrides the matching hand-drawn sprite at runtime.
   The game stays fully playable on the built-in drawing until (and unless) the image loads. */
function loadSpriteOverrides(){
  fetch("assets/manifest.json").then(r=>r.ok?r.json():[]).then(list=>{
    if(!Array.isArray(list))return;
    list.forEach(k=>{const img=new Image();
      img.onload=()=>{if(img.naturalWidth){SPR[k]=img;delete DURL[k];miniDirty=true;
        if(document.body.classList.contains("drawer-open"))renderDrawer();}};
      img.src="assets/"+encodeURIComponent(k)+".png";});
  }).catch(()=>{});
}
loadSpriteOverrides();
showStart();
requestAnimationFrame(tick);
/* installable app when served over https */
if("serviceWorker" in navigator && location.protocol==="https:"){
  addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").catch(()=>{});});
}
